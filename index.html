<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>တိရစ္ဆာန်လောင်းကစား (၃၆ ကောင်)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .hidden-ui { display: none !important; }
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="message-box" class="fixed top-5 right-5 z-50 hidden p-4 rounded-xl shadow-2xl text-white"></div>

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-100">
        <div class="bg-white p-5 rounded-3xl shadow-xl border border-gray-100 max-w-sm w-full">
            <h1 class="text-2xl font-black text-gray-800 mb-6 text-center tracking-tight">တိရစ္ဆာန် လောင်းကစား</h1>
            <div class="mb-4 space-y-3">
                <input type="text" id="login-name" class="p-3 bg-gray-50 border-none rounded-xl w-full focus:ring-2 focus:ring-blue-500 transition" placeholder="အမည် (User ID)">
                <input type="password" id="login-pass" class="p-3 bg-gray-50 border-none rounded-xl w-full focus:ring-2 focus:ring-blue-500 transition" placeholder="စကားဝှက်">
                <button id="login-existing-btn" class="bg-blue-600 text-white w-full py-3 rounded-xl font-bold hover:bg-blue-700 active:scale-95 transition-all shadow-lg shadow-blue-200">ဝင်မည်</button>
            </div>
            <button id="admin-login-trigger" class="w-full text-gray-400 font-semibold text-sm hover:text-gray-800 transition">Admin ဝင်ရောက်ရန်</button>
        </div>
    </div>

    <div id="game-ui" class="hidden-ui flex flex-col md:flex-row h-screen">
        <div class="w-full md:w-80 bg-white border-r border-gray-100 flex-shrink-0 p-4 md:p-6 overflow-y-auto flex flex-col gap-6 shadow-sm">
            <div class="flex flex-col gap-4">
                <h1 class="text-xl font-black text-gray-800 tracking-tight">Game Panel</h1>
                <div class="bg-gray-50 p-4 rounded-2xl flex flex-col gap-2">
                    <p id="current-user-display" class="font-bold text-gray-500 text-xs uppercase tracking-wider"></p>
                    <p class="text-2xl font-black text-gray-800">Coins: <span id="coin-balance" class="text-blue-600">0</span></p>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button id="open-chat-btn" class="bg-gray-100 text-gray-600 py-2 rounded-xl font-bold text-sm hover:bg-gray-200 active:scale-95">💬 Chat</button>
                    <button id="open-private-chat-btn" class="bg-purple-100 text-purple-600 py-2 rounded-xl font-bold text-sm hover:bg-purple-200 active:scale-95">🔒 Admin</button>
                    <button id="open-history-btn" class="bg-yellow-100 text-yellow-600 py-2 rounded-xl font-bold text-sm hover:bg-yellow-200 active:scale-95">📜 History</button>
                    <button id="logout-btn" class="col-span-2 bg-red-50 text-red-600 py-2 rounded-xl font-bold text-sm hover:bg-red-100 active:scale-95">Logout</button>
                </div>
            </div>
            <div class="bg-white border border-gray-100 p-4 rounded-2xl">
                <h4 class="font-bold text-gray-500 text-xs uppercase mb-1">လက်ရှိလောင်းထားမှု</h4>
                <p class="text-xl font-black text-gray-800"><span id="current-bet-count" class="text-red-500">0</span> coin</p>
                <div id="win-loss-status" class="text-xs font-bold mt-2 text-gray-400">စောင့်ဆိုင်းနေသည်...</div>
            </div>
            <div class="bg-blue-600 p-4 rounded-2xl shadow-lg flex flex-row justify-between items-center text-white">
                <h4 class="font-bold text-blue-100 text-xs uppercase">အချိန်</h4>
                <span id="timer-display" class="text-3xl font-black font-mono tracking-tighter">--:--</span>
            </div>
        </div>

        <div class="flex-1 bg-gray-50 p-4 md:p-8 overflow-y-auto">
            <div id="result-display" class="hidden-ui bg-yellow-400 p-4 rounded-2xl text-center font-black text-lg mb-6 shadow-lg text-yellow-900"></div>
            <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-6 gap-3" id="animal-grid"></div>

            <div id="admin-panel" class="hidden-ui bg-gray-900 text-white p-4 md:p-8 mt-8 rounded-3xl">
                <h3 class="font-bold text-yellow-400 mb-6 text-xl tracking-tight">Admin Control</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <button id="reset-game-btn" class="bg-green-600 py-4 rounded-2xl font-bold hover:bg-green-700 transition">Reset</button>
                    <button id="calc-result-btn" class="bg-yellow-600 py-4 rounded-2xl font-bold hover:bg-yellow-700 transition">ရလဒ်ထုတ်</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modals -->
    <div id="history-modal" class="hidden-ui fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
        <div class="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-lg">
            <div class="flex justify-between items-center mb-4">
                <h4 class="font-bold text-gray-800 uppercase">ဂိမ်းမှတ်တမ်း (History)</h4>
                <button onclick="document.getElementById('history-modal').classList.add('hidden-ui')" class="text-gray-400">✕</button>
            </div>
            <div id="history-content" class="h-80 overflow-y-auto space-y-3"></div>
        </div>
    </div>

    <!-- Chat Modals (omitted for brevity in this display, but included logic below) -->
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbRZLUYhEvTHoCscb2ul_JURGsfBjCF4s",
            authDomain: "birthday-62720.firebaseapp.com",
            databaseURL: "https://birthday-62720-default-rtdb.firebaseio.com",
            projectId: "birthday-62720",
            storageBucket: "birthday-62720.firebasestorage.app",
            messagingSenderId: "915031456534",
            appId: "1:915031456534:web:816308654f76be33b62e37"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showMsg(text, isError = false) {
            const box = document.getElementById('message-box');
            box.innerText = text;
            box.className = `fixed top-5 right-5 z-50 p-4 rounded-xl shadow-2xl text-white ${isError ? 'bg-red-600' : 'bg-green-600'}`;
            box.classList.remove('hidden-ui');
            setTimeout(() => box.classList.add('hidden-ui'), 3000);
        }

        const gameData = ["မြင်း", "ရွှေနဂါး", "လိပ်ပြာ", "ဆတ်", "မြွေ", "မျောက်", "ပင့်ကူ", "ဗျိုင်း", "ငန်း", "ခရု", "ဆင်", "ရွှေငါး", "ကြက်", "လိပ်", "ကျီး", "ကျား", "ဝက်", "ဒေါင်း", "ယုန်", "ခွေး", "ပုစွန်", "ဆိတ်", "နွား", "ဖား", "ပျား", "ကြွက်", "ငါးရှဉ့်", "ကျားသစ်", "ခြင်္သေ့", "သမင်", "ဝံပုလွေ", "လင်းယုန်", "ကြောင်", "ပုရွက်ဆိတ်", "ပိုးကောင်", "ငါး"];
        const animalEmojis = ["🐎", "🐉", "🦋", "🦌", "🐍", "🐒", "🕷️", "🦢", "🦆", "🐌", "🐘", "🐠", "🐓", "🐢", "🐦‍⬛", "🐅", "🐖", "🦚", "🐇", "🐕", "🦐", "🐐", "🐂", "🐸", "🐝", "🐀", "🐍", "🐆", "🦁", "🦌", "🐺", "🦅", "🐈", "🐜", "🐛", "🐟"];

        let users = {}, adminState = {}, currentUserId = localStorage.getItem('game_uid'), isAdmin = localStorage.getItem('is_admin') === 'true';

        db.ref('users').on('value', (snap) => { users = snap.val() || {}; updateUI(); });
        db.ref('adminState').on('value', (snap) => { adminState = snap.val() || { nextReveal: 0, processed: true }; updateUI(); });

        document.getElementById('open-history-btn').onclick = () => {
            const modal = document.getElementById('history-modal');
            modal.classList.remove('hidden-ui');
            const historyContent = document.getElementById('history-content');
            historyContent.innerHTML = "Loading...";
            
            db.ref(`users/${currentUserId}/history`).limitToLast(10).once('value', (snap) => {
                historyContent.innerHTML = "";
                const history = snap.val();
                if (!history) return historyContent.innerHTML = "မှတ်တမ်းမရှိသေးပါ။";
                
                Object.values(history).reverse().forEach(entry => {
                    const div = document.createElement('div');
                    div.className = `p-3 rounded-xl border ${entry.won ? 'bg-green-50 border-green-200' : 'bg-gray-50'}`;
                    let betText = Object.keys(entry.selections).map(i => `${gameData[i]} (${entry.selections[i]})`).join(', ');
                    div.innerHTML = `
                        <div class="text-[10px] text-gray-500">${new Date(entry.time).toLocaleString()}</div>
                        <div class="font-bold">${betText}</div>
                        <div class="text-sm">ရလဒ်: ${entry.winner} ${entry.won ? '<span class="text-green-600 font-black">WIN!</span>' : ''}</div>
                    `;
                    historyContent.appendChild(div);
                });
            });
        };

        function calculateResults() {
            if (adminState.processed) return;
            let totalBets = new Array(gameData.length).fill(0);
            Object.keys(users).forEach(uid => {
                if(users[uid].selections) {
                    Object.keys(users[uid].selections).forEach(idx => { totalBets[idx] += users[uid].selections[idx]; });
                }
            });
            let winnerIdx = Math.floor(Math.random() * gameData.length);
            let winnerName = gameData[winnerIdx];
            
            Object.keys(users).forEach(uid => {
                const user = users[uid];
                let winnings = 0;
                if(user.selections && user.selections[winnerIdx]) {
                    winnings = user.selections[winnerIdx] * 27;
                }
                
                // Save History
                if(user.selections) {
                    db.ref(`users/${uid}/history`).push({
                        time: Date.now(),
                        selections: user.selections,
                        winner: winnerName,
                        won: (user.selections[winnerIdx] ? true : false)
                    });
                }
                
                db.ref(`users/${uid}`).update({
                    balance: (user.balance || 0) + winnings,
                    selections: null
                });
            });
            
            db.ref('adminState').update({ nextReveal: Date.now() + 180000, lastWinner: winnerName, processed: true });
            setTimeout(() => { db.ref('adminState').update({ processed: false }); }, 5000);
        }

        // ... (Existing helper functions remain same) ...
        document.getElementById('login-existing-btn').onclick = async () => { /* ... existing ... */ };
        document.getElementById('admin-login-trigger').onclick = () => { /* ... existing ... */ };
        document.getElementById('logout-btn').onclick = () => { localStorage.clear(); location.reload(); };
        document.getElementById('calc-result-btn').onclick = calculateResults;
        document.getElementById('reset-game-btn').onclick = () => { /* ... existing ... */ };
    </script>
</body>
</html>
