<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>တိရစ္ဆာန် လောင်းကစား (၃၆ ကောင်)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div id="app" class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">(၃၆ ကောင်)</h1>

        <!-- Login Screen -->
        <div id="login-screen" class="bg-white p-6 rounded-2xl shadow-xl max-w-md mx-auto">
            <input type="text" id="user-name" class="p-3 border rounded-lg w-full mb-2" placeholder="အမည် (English)">
            <input type="password" id="user-pass" class="p-3 border rounded-lg w-full mb-4" placeholder="စကားဝှက်">
            <button id="login-btn" class="bg-blue-600 text-white w-full py-3 rounded-lg font-bold mb-2">ဝင်မည် / အကောင့်ဖွင့်မည်</button>
            <button id="admin-login-btn" class="bg-gray-800 text-white w-full py-3 rounded-lg font-bold">Admin ဝင်ရန်</button>
        </div>

        <!-- Game UI -->
        <div id="game-ui" class="hidden">
            <div class="bg-white p-4 rounded-xl shadow mb-4 flex justify-between items-center">
                <div>
                    <p id="user-display" class="font-bold text-gray-700"></p>
                    <p class="text-blue-600 font-bold text-lg">Coins: <span id="coin-balance">0</span></p>
                </div>
                <button id="logout-btn" class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm">Logout</button>
            </div>

            <!-- Admin Panel -->
            <div id="admin-panel" class="hidden bg-gray-900 text-white p-4 rounded-xl mb-4">
                <h3 class="font-bold text-yellow-400 mb-2">Admin Panel</h3>
                <p id="admin-status" class="text-sm">Status: --</p>
            </div>

            <div class="bg-blue-600 text-white p-4 rounded-xl text-center font-bold mb-4">
                အချိန် - <span id="timer-display" class="text-2xl font-mono">--:--</span>
            </div>

            <div id="result-display" class="hidden bg-yellow-400 p-3 rounded-lg text-center font-bold mb-4"></div>

            <div id="animal-grid" class="grid grid-cols-4 md:grid-cols-6 gap-2"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbRZLUYhEvTHoCscb2ul_JURGsfBjCF4s",
            authDomain: "birthday-62720.firebaseapp.com",
            databaseURL: "https://birthday-62720-default-rtdb.firebaseio.com",
            projectId: "birthday-62720",
            storageBucket: "birthday-62720.firebasestorage.app",
            messagingSenderId: "915031456534",
            appId: "1:915031456534:web:816308654f76be33b62e37"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const animals = ["မြင်း", "ရွှေနဂါး", "လိပ်ပြာ", "ဆတ်", "မြွေ", "မျောက်", "ပင့်ကူ", "ဗျိုင်း", "ငန်း", "ခရု", "ဆင်", "ရွှေငါး", "ကြက်", "လိပ်", "ကျီး", "ကျား", "ဝက်", "ဒေါင်း", "ယုန်", "ခွေး", "ပုစွန်", "ဆိတ်", "နွား", "ဖား", "ပျား", "ကြွက်", "ငါးရှဉ့်", "ကျားသစ်", "ခြင်္သေ့", "သမင်", "ဝံပုလွေ", "လင်းယုန်", "ကြောင်", "ပုရွက်ဆိတ်", "ပိုးကောင်", "ငါး"];
        
        let uid = localStorage.getItem('game_uid');
        let isAdmin = localStorage.getItem('is_admin') === 'true';
        let users = {}, adminState = { nextReveal: Date.now() + 180000, lastWinnerIdx: -1, status: 'betting' };

        db.ref('users').on('value', snap => { users = snap.val() || {}; updateUI(); });
        db.ref('adminState').on('value', snap => { adminState = snap.val() || adminState; updateUI(); });

        function updateUI() {
            if ((uid && users[uid]) || isAdmin) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('game-ui').classList.remove('hidden');
                if (uid) {
                    document.getElementById('user-display').innerText = "User: " + users[uid].name;
                    document.getElementById('coin-balance').innerText = users[uid].balance || 0;
                }
                if (isAdmin) {
                    document.getElementById('admin-panel').classList.remove('hidden');
                    document.getElementById('admin-status').innerText = "Status: " + adminState.status;
                }
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('game-ui').classList.add('hidden');
            }

            if (adminState.lastWinnerIdx !== -1) {
                const bar = document.getElementById('result-display');
                bar.classList.remove('hidden');
                bar.innerText = "ပြီးခဲ့သည့်ပွဲ အနိုင် - " + animals[adminState.lastWinnerIdx];
            }
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('animal-grid');
            grid.innerHTML = '';
            animals.forEach((name, i) => {
                const bet = (uid && users[uid].selections) ? (users[uid].selections[i] || 0) : 0;
                const div = document.createElement('div');
                div.className = "bg-white p-3 rounded-lg border shadow-sm text-center cursor-pointer relative hover:bg-blue-50";
                div.innerHTML = `<p class="text-xs font-bold">${name}</p>${bet > 0 ? `<span class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-5 h-5 text-[10px] flex items-center justify-center">${bet}</span>` : ''}`;
                div.onclick = () => {
                    if (!uid || (users[uid].balance || 0) < 1 || adminState.status === 'processing') return;
                    db.ref(`users/${uid}/balance`).set((users[uid].balance || 0) - 1);
                    db.ref(`users/${uid}/selections/${i}`).set((bet + 1));
                };
                grid.appendChild(div);
            });
        }

        setInterval(() => {
            const now = Date.now();
            const diff = adminState.nextReveal - now;
            if (diff > 0) {
                document.getElementById('timer-display').innerText = Math.floor(diff/60000) + ":" + Math.floor((diff%60000)/1000).toString().padStart(2, '0');
            } else if (adminState.status === 'betting') {
                processWinner();
            }
        }, 1000);

        function processWinner() {
            db.ref('adminState').update({ status: 'processing' });
            let totals = new Array(36).fill(0), totalBets = 0;
            Object.values(users).forEach(u => {
                if(u.selections) Object.entries(u.selections).forEach(([i, c]) => { totals[parseInt(i)] += c; totalBets += c; });
            });

            let winner;
            if (totalBets > 30) {
                let min = Math.min(...totals);
                let mins = totals.map((v, i) => v === min ? i : -1).filter(i => i !== -1);
                winner = mins[Math.floor(Math.random() * mins.length)];
            } else {
                let zeros = totals.map((v, i) => v === 0 ? i : -1).filter(i => i !== -1);
                winner = zeros.length > 0 ? zeros[Math.floor(Math.random() * zeros.length)] : Math.floor(Math.random() * 36);
            }

            Object.keys(users).forEach(u => {
                if(users[u].selections && users[u].selections[winner]) {
                    db.ref(`users/${u}/balance`).set((users[u].balance || 0) + (users[u].selections[winner] * 27));
                }
                db.ref(`users/${u}/selections`).set({});
            });
            db.ref('adminState').update({ nextReveal: Date.now() + 180000, lastWinnerIdx: winner, status: 'betting' });
        }

        document.getElementById('login-btn').onclick = () => {
            const n = document.getElementById('user-name').value.trim();
            const p = document.getElementById('user-pass').value.trim();
            if(!n || !p) return;
            uid = n.replace(/[^a-z0-9]/gi, '');
            db.ref('users/'+uid).once('value', s => {
                if(!s.exists()) db.ref('users/'+uid).set({name: n, balance: 100});
                localStorage.setItem('game_uid', uid);
                localStorage.removeItem('is_admin');
                updateUI();
            });
        };

        document.getElementById('admin-login-btn').onclick = () => {
            if(prompt("Admin Password:") === 'admin123') {
                isAdmin = true; localStorage.setItem('is_admin', 'true');
                localStorage.removeItem('game_uid');
                updateUI();
            }
        };

        document.getElementById('logout-btn').onclick = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
</html>
