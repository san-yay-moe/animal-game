<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>တိရစ္ဆာန်လောင်းကစား (၃၆ ကောင်)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div id="app" class="max-w-xl mx-auto">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">တိရစ္ဆာန် လောင်းကစား</h1>

        <div id="login-screen" class="bg-white p-6 rounded-2xl shadow-xl">
            <input type="text" id="login-name" class="p-3 border rounded-lg w-full mb-2" placeholder="အမည် (English)">
            <input type="password" id="login-pass" class="p-3 border rounded-lg w-full mb-4" placeholder="စကားဝှက်">
            <button id="login-btn" class="bg-blue-600 text-white w-full py-3 rounded-lg font-bold mb-2">ဝင်မည် / အကောင့်ဖွင့်မည်</button>
            <button id="admin-btn" class="bg-gray-800 text-white w-full py-3 rounded-lg font-bold">Admin ဝင်ရန်</button>
        </div>

        <div id="game-ui" class="hidden">
            <div class="bg-white p-4 rounded-xl shadow mb-4 flex justify-between items-center">
                <div>
                    <p id="user-display" class="font-bold"></p>
                    <p class="text-blue-600 font-bold">Coins: <span id="coin-balance">0</span></p>
                </div>
                <button id="logout-btn" class="bg-red-500 text-white px-3 py-1 rounded text-sm">Logout</button>
            </div>

            <div id="admin-panel" class="hidden bg-gray-900 text-white p-4 rounded-xl mb-4">
                <h3 class="text-yellow-400 font-bold mb-2">Admin Panel</h3>
                <select id="user-select" class="text-black w-full p-2 mb-2 rounded"></select>
                <div class="flex gap-2">
                    <button id="add-btn" class="bg-blue-600 px-4 py-1 rounded">Coin ထည့်</button>
                    <button id="sub-btn" class="bg-orange-600 px-4 py-1 rounded">Coin နုတ်</button>
                </div>
            </div>

            <div class="text-center font-bold text-xl mb-4 bg-white p-2 rounded shadow">
                အချိန် - <span id="timer" class="text-red-600">--:--</span>
            </div>

            <div id="result-bar" class="hidden bg-yellow-200 p-2 rounded text-center font-bold mb-4"></div>

            <div id="grid" class="grid grid-cols-4 gap-2"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbRZLUYhEvTHoCscb2ul_JURGsfBjCF4s",
            authDomain: "birthday-62720.firebaseapp.com",
            databaseURL: "https://birthday-62720-default-rtdb.firebaseio.com",
            projectId: "birthday-62720",
            storageBucket: "birthday-62720.firebasestorage.app",
            messagingSenderId: "915031456534",
            appId: "1:915031456534:web:816308654f76be33b62e37"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const animals = ["မြင်း", "ရွှေနဂါး", "လိပ်ပြာ", "ဆတ်", "မြွေ", "မျောက်", "ပင့်ကူ", "ဗျိုင်း", "ငန်း", "ခရု", "ဆင်", "ရွှေငါး", "ကြက်", "လိပ်", "ကျီး", "ကျား", "ဝက်", "ဒေါင်း", "ယုန်", "ခွေး", "ပုစွန်", "ဆိတ်", "နွား", "ဖား", "ပျား", "ကြွက်", "ငါးရှဉ့်", "ကျားသစ်", "ခြင်္သေ့", "သမင်", "ဝံပုလွေ", "လင်းယုန်", "ကြောင်", "ပုရွက်ဆိတ်", "ပိုးကောင်", "ငါး"];
        
        let users = {}, adminState = { nextReveal: Date.now() + 180000, lastWinnerIdx: -1 };
        let uid = localStorage.getItem('uid'), isAdmin = localStorage.getItem('isAdmin') === 'true';

        db.ref('users').on('value', snap => { users = snap.val() || {}; updateUI(); });
        db.ref('adminState').on('value', snap => { adminState = snap.val() || adminState; updateUI(); });

        function updateUI() {
            if (uid || isAdmin) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('game-ui').classList.remove('hidden');
                if (isAdmin) document.getElementById('admin-panel').classList.remove('hidden');
                if (uid && users[uid]) {
                    document.getElementById('user-display').innerText = users[uid].name;
                    document.getElementById('coin-balance').innerText = users[uid].balance || 0;
                }
            }
            if (adminState.lastWinnerIdx !== -1) {
                const bar = document.getElementById('result-bar');
                bar.classList.remove('hidden');
                bar.innerText = "ပြီးခဲ့သည့်ပွဲ အနိုင် - " + animals[adminState.lastWinnerIdx];
            }
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            animals.forEach((name, i) => {
                const bet = (users[uid] && users[uid].selections) ? (users[uid].selections[i] || 0) : 0;
                const btn = document.createElement('button');
                btn.className = "bg-white p-3 rounded shadow text-sm relative border hover:bg-blue-50";
                btn.innerHTML = `${name} ${bet > 0 ? `<span class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-5 h-5 text-[10px] flex items-center justify-center">${bet}</span>` : ''}`;
                btn.onclick = () => {
                    if (isAdmin || !uid || (users[uid].balance || 0) < 1) return;
                    db.ref(`users/${uid}/balance`).set((users[uid].balance || 0) - 1);
                    db.ref(`users/${uid}/selections/${i}`).set((bet + 1));
                };
                grid.appendChild(btn);
            });
        }

        setInterval(() => {
            const diff = adminState.nextReveal - Date.now();
            if (diff > 0) {
                document.getElementById('timer').innerText = Math.floor(diff/60000) + ":" + Math.floor((diff%60000)/1000).toString().padStart(2, '0');
            } else if (isAdmin) {
                processWinner();
            }
        }, 1000);

        function processWinner() {
            let totals = new Array(36).fill(0), totalBets = 0;
            Object.values(users).forEach(u => {
                if(u.selections) Object.entries(u.selections).forEach(([i, c]) => { totals[i] += c; totalBets += c; });
            });

            let winner;
            if (totalBets <= 30) {
                let zeros = totals.map((v, i) => v === 0 ? i : -1).filter(i => i !== -1);
                winner = zeros.length > 0 ? zeros[Math.floor(Math.random() * zeros.length)] : Math.floor(Math.random() * 36);
            } else {
                let min = Math.min(...totals);
                let mins = totals.map((v, i) => v === min ? i : -1).filter(i => i !== -1);
                winner = mins[Math.floor(Math.random() * mins.length)];
            }

            Object.keys(users).forEach(u => {
                if(users[u].selections && users[u].selections[winner]) {
                    db.ref(`users/${u}/balance`).set((users[u].balance || 0) + (users[u].selections[winner] * 27));
                }
                db.ref(`users/${u}/selections`).set({});
            });
            db.ref('adminState').update({ nextReveal: Date.now() + 180000, lastWinnerIdx: winner });
        }

        document.getElementById('login-btn').onclick = () => {
            const name = document.getElementById('login-name').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            if (!name || !pass) return;
            uid = name.replace(/[^a-z0-9]/gi, '');
            db.ref('users/'+uid).once('value', snap => {
                if (!snap.exists()) {
                    db.ref('users/'+uid).set({name: name, password: pass, balance: 100, selections: {}}).then(() => {
                        localStorage.setItem('uid', uid); updateUI();
                    });
                } else if (snap.val().password === pass) {
                    localStorage.setItem('uid', uid); updateUI();
                } else alert("Password မှားသည်");
            });
        };

        document.getElementById('admin-btn').onclick = () => {
            if(prompt("Admin Pass:") === 'admin123') { isAdmin = true; localStorage.setItem('isAdmin', 'true'); updateUI(); }
        };

        document.getElementById('logout-btn').onclick = () => { localStorage.clear(); location.reload(); };
        document.getElementById('add-btn').onclick = () => { 
            const u = document.getElementById('user-select').value;
            db.ref(`users/${u}/balance`).transaction(b => (b || 0) + 100); 
        };
        db.ref('users').on('value', snap => {
            const sel = document.getElementById('user-select');
            sel.innerHTML = '';
            Object.keys(snap.val() || {}).forEach(u => {
                const opt = document.createElement('option'); opt.value = u; opt.text = snap.val()[u].name; sel.appendChild(opt);
            });
        });
    </script>
</body>
</html>
