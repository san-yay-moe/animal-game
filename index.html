<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>တိရစ္ဆာန်လောင်းကစား (၃၆ ကောင်)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .hidden-ui { display: none !important; }
        .glass-effect { backdrop-filter: blur(12px); background: rgba(255, 255, 255, 0.8); }
        .sidebar-gradient { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); }
    </style>
</head>
<body class="h-screen overflow-hidden text-slate-800">
    <div id="message-box" class="fixed top-5 right-5 z-[100] hidden p-4 rounded-xl shadow-2xl text-white font-semibold text-sm animate-fade-in"></div>

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-50">
        <div class="bg-white p-8 rounded-3xl shadow-2xl border border-slate-100 max-w-sm w-full">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl font-black mx-auto mb-6 shadow-lg shadow-blue-500/30">36</div>
            <h1 class="text-2xl font-black text-slate-900 mb-6 text-center">Admin Panel</h1>
            <div class="mb-6 space-y-4">
                <input type="text" id="login-name" class="p-4 bg-slate-50 border border-slate-200 rounded-xl w-full focus:ring-4 focus:ring-blue-500/20 outline-none transition" placeholder="အမည် (User ID)">
                <input type="password" id="login-pass" class="p-4 bg-slate-50 border border-slate-200 rounded-xl w-full focus:ring-4 focus:ring-blue-500/20 outline-none transition" placeholder="စကားဝှက်">
                <button id="login-existing-btn" class="bg-blue-600 text-white w-full py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-500/20 active:scale-95">ဝင်ရောက်မည်</button>
            </div>
            <button id="admin-login-trigger" class="w-full text-slate-400 text-xs hover:text-blue-600 transition font-medium">Admin ဝင်ရောက်ရန်</button>
        </div>
    </div>

    <!-- Game UI -->
    <div id="game-ui" class="hidden-ui flex flex-col md:flex-row h-screen">
        
        <!-- Sidebar -->
        <div class="w-full md:w-80 sidebar-gradient text-white flex-shrink-0 p-8 overflow-y-auto flex flex-col gap-8 shadow-2xl">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center font-black">36</div>
                <h1 class="text-xl font-black tracking-tight">Game System</h1>
            </div>
            
            <div class="bg-white/10 p-5 rounded-2xl border border-white/5 backdrop-blur-sm">
                <p id="current-user-display" class="font-bold text-slate-400 text-[10px] uppercase tracking-widest mb-1"></p>
                <p class="text-3xl font-black text-white"><span id="coin-balance">0</span> <span class="text-sm font-medium text-slate-400">Coins</span></p>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button id="open-chat-btn" class="bg-white/5 hover:bg-white/10 text-white py-3 rounded-xl font-bold text-xs transition border border-white/5">💬 Chat</button>
                <button id="open-private-chat-btn" class="bg-purple-600/20 hover:bg-purple-600/40 text-purple-200 py-3 rounded-xl font-bold text-xs transition border border-purple-500/20">🔒 Admin</button>
                <button id="logout-btn" class="col-span-2 bg-red-600/20 hover:bg-red-600/40 text-red-200 py-3 rounded-xl font-bold text-xs transition border border-red-500/20">Logout</button>
            </div>

            <div class="mt-auto space-y-4">
                <div class="bg-black/20 p-5 rounded-2xl">
                    <h4 class="font-bold text-slate-400 text-[10px] uppercase mb-2">လက်ရှိလောင်းထားမှု</h4>
                    <p class="text-xl font-black"><span id="current-bet-count" class="text-blue-400">0</span> <span class="text-sm text-slate-500">coins</span></p>
                    <div id="win-loss-status" class="text-[10px] font-bold mt-2 text-slate-500">စောင့်ဆိုင်းနေသည်...</div>
                </div>
                <div class="bg-blue-600 p-6 rounded-2xl shadow-xl shadow-blue-900/50">
                    <h4 class="font-bold text-blue-200 text-[10px] uppercase mb-2">အချိန်</h4>
                    <span id="timer-display" class="text-4xl font-black font-mono tracking-tighter">--:--</span>
                </div>
            </div>
        </div>

        <!-- Main Area -->
        <div class="flex-1 p-8 overflow-y-auto bg-slate-50">
            <div id="result-display" class="hidden-ui bg-emerald-500 p-4 rounded-2xl text-center font-bold text-white mb-8 shadow-xl shadow-emerald-500/20 border-b-4 border-emerald-700"></div>
            <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-4" id="animal-grid"></div>
        </div>

        <!-- Modals -->
        <div id="chat-modal" class="hidden-ui fixed inset-0 z-[110] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md">
            <div class="bg-white p-8 rounded-3xl w-full max-w-lg shadow-2xl border border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <h4 class="font-bold text-lg">Public Chat</h4>
                    <button id="close-chat-btn" class="text-slate-400 hover:text-slate-900 transition">✕</button>
                </div>
                <div id="chat-messages" class="h-64 overflow-y-auto mb-6 space-y-3 text-sm bg-slate-50 p-5 rounded-2xl"></div>
                <div class="flex gap-2">
                    <input type="text" id="chat-input" class="flex-grow p-4 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-blue-600 outline-none" placeholder="စာရိုက်ပါ...">
                    <button id="send-chat-btn" class="bg-blue-600 text-white px-8 py-4 rounded-xl font-bold shadow-lg shadow-blue-500/30">ပို့</button>
                </div>
            </div>
        </div>
        
        <!-- Admin Panel -->
        <div id="admin-panel" class="hidden-ui w-full md:w-80 bg-slate-900 text-white p-8 overflow-y-auto h-screen shadow-2xl flex-shrink-0">
            <h3 class="font-black text-yellow-400 mb-8 text-xl tracking-tight">Admin Control</h3>
            <div class="grid grid-cols-5 gap-2 mb-8">
                <button class="timer-btn h-10 rounded-lg border border-yellow-400/30 text-yellow-400 font-bold hover:bg-yellow-400 hover:text-black transition" onclick="setTimer(1)">1m</button>
                <button class="timer-btn h-10 rounded-lg border border-yellow-400/30 text-yellow-400 font-bold hover:bg-yellow-400 hover:text-black transition" onclick="setTimer(3)">3m</button>
                <button class="timer-btn h-10 rounded-lg border border-yellow-400/30 text-yellow-400 font-bold hover:bg-yellow-400 hover:text-black transition" onclick="setTimer(5)">5m</button>
                <button class="timer-btn h-10 rounded-lg border border-yellow-400/30 text-yellow-400 font-bold hover:bg-yellow-400 hover:text-black transition" onclick="setTimer(10)">10m</button>
                <button class="timer-btn h-10 rounded-lg border border-yellow-400/30 text-yellow-400 font-bold hover:bg-yellow-400 hover:text-black transition" onclick="setTimer(30)">30m</button>
            </div>
            <div class="grid grid-cols-1 gap-3 mb-8">
                <button id="reset-game-btn" class="bg-emerald-600 py-3 rounded-xl font-bold hover:bg-emerald-700 transition">Reset</button>
                <button id="calc-result-btn" class="bg-yellow-600 py-3 rounded-xl font-bold text-black hover:bg-yellow-500 transition">ရလဒ်ထုတ်</button>
            </div>
            <!-- ... -->
        </div>
    </div>
    
    <!-- JS & Firebase remain unchanged -->
</body>
</html>
