<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>တိရစ္ဆာန်လောင်းကစား (၃၆ ကောင်)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .hidden-ui { display: none !important; }
        .bet-badge { position: absolute; top: -5px; right: -5px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div id="app" class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">ကတိရစ္ဆာန် လောင်းကစား (၃၆ ကောင်)</h1>

        <!-- Login -->
        <div id="login-screen" class="bg-white p-6 rounded-2xl shadow-xl max-w-md mx-auto">
            <input type="text" id="user-name" class="w-full p-3 border rounded mb-2" placeholder="အမည်">
            <input type="password" id="user-pass" class="w-full p-3 border rounded mb-4" placeholder="စကားဝှက်">
            <button id="login-btn" class="w-full bg-green-600 text-white p-3 rounded font-bold mb-2">ဝင်ရောက်ရန်</button>
            <button id="admin-login-btn" class="w-full bg-gray-800 text-white p-3 rounded font-bold">Admin ဝင်ရန်</button>
        </div>

        <!-- Game -->
        <div id="game-ui" class="hidden-ui">
            <div class="bg-white p-4 rounded-xl shadow mb-4 flex justify-between items-center">
                <span id="user-display" class="font-bold text-blue-600">...</span>
                <button id="logout-btn" class="bg-red-500 text-white px-4 py-1 rounded">Logout</button>
            </div>
            <div class="text-center font-bold text-xl mb-4">အချိန် - <span id="timer">--:--</span></div>
            <div id="animal-grid" class="grid grid-cols-4 sm:grid-cols-6 gap-2"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbRZLUYhEvTHoCscb2ul_JURGsfBjCF4s",
            authDomain: "birthday-62720.firebaseapp.com",
            databaseURL: "https://birthday-62720-default-rtdb.firebaseio.com",
            projectId: "birthday-62720",
            storageBucket: "birthday-62720.firebasestorage.app",
            messagingSenderId: "915031456534",
            appId: "1:915031456534:web:816308654f76be33b62e37"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const animals = ["မြင်း", "ရွှေနဂါး", "လိပ်ပြာ", "ဆတ်", "မြွေ", "မျောက်", "ပင့်ကူ", "ဗျိုင်း", "ငန်း", "ခရု", "ဆင်", "ရွှေငါး", "ကြက်", "လိပ်", "ကျီး", "ကျား", "ဝက်", "ဒေါင်း", "ယုန်", "ခွေး", "ပုစွန်", "ဆိတ်", "နွား", "ဖား", "ပျား", "ကြွက်", "ငါးရှဉ့်", "ကျားသစ်", "ခြင်္သေ့", "သမင်", "ဝံပုလွေ", "လင်းယုန်", "ကြောင်", "ပုရွက်ဆိတ်", "ပိုးကောင်", "ငါး"];
        
        let currentUser = null;
        let userData = null;

        // Login
        document.getElementById('login-btn').onclick = async () => {
            const n = document.getElementById('user-name').value.trim();
            const p = document.getElementById('user-pass').value.trim();
            if(!n || !p) return alert("အမည်/စကားဝှက် ထည့်ပါ");
            
            const uid = n.replace(/[^a-z0-9]/gi, '');
            const snap = await db.ref('users/' + uid).once('value');
            if(!snap.exists()) await db.ref('users/' + uid).set({name: n, password: p, balance: 100, selections: {}});
            
            const user = snap.val() || {name: n, balance: 100};
            if(user.password && user.password !== p) return alert("စကားဝှက် မှားနေသည်");
            
            currentUser = uid;
            document.getElementById('login-screen').classList.add('hidden-ui');
            document.getElementById('game-ui').classList.remove('hidden-ui');
            listenUser();
        };

        function listenUser() {
            db.ref('users/' + currentUser).on('value', (snap) => {
                userData = snap.val();
                document.getElementById('user-display').innerText = `${userData.name} | Coin: ${userData.balance}`;
                renderGrid();
            });
        }

        function renderGrid() {
            const grid = document.getElementById('animal-grid');
            grid.innerHTML = '';
            animals.forEach((a, i) => {
                const count = (userData.selections && userData.selections[i]) ? userData.selections[i] : 0;
                const btn = document.createElement('button');
                btn.className = "p-2 bg-white border rounded shadow-sm text-xs hover:bg-blue-50 relative";
                btn.innerHTML = `${a} ${count > 0 ? `<span class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-4 h-4 text-[10px]">${count}</span>` : ''}`;
                btn.onclick = () => {
                    if(userData.balance < 1) return alert("Coin မလုံလောက်ပါ");
                    db.ref(`users/${currentUser}/balance`).set(userData.balance - 1);
                    db.ref(`users/${currentUser}/selections/${i}`).set((userData.selections && userData.selections[i] ? userData.selections[i] : 0) + 1);
                };
                grid.appendChild(btn);
            });
        }

        document.getElementById('logout-btn').onclick = () => location.reload();
        document.getElementById('admin-login-btn').onclick = () => { if(prompt("Admin Password:") === 'admin123') alert("Admin အဖြစ် ဝင်ရောက်ပါပြီ"); };
    </script>
</body>
</html>
