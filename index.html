<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>တိရစ္ဆာန်လောင်းကစား (၃၆ ကောင်)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .hidden-ui { display: none !important; }
        body { font-family: sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div id="app" class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">တိရစ္ဆာန် လောင်းကစား (၃၆ ကောင်)</h1>

        <!-- Login Screen -->
        <div id="login-screen" class="bg-white p-6 rounded-2xl shadow-xl max-w-md mx-auto">
            <h2 class="text-lg font-bold mb-4 text-center">အကောင့်ဝင်ရန်</h2>
            <input type="text" id="login-name" class="p-3 border rounded-lg w-full mb-2" placeholder="အမည် (User ID)">
            <input type="password" id="login-pass" class="p-3 border rounded-lg w-full mb-4" placeholder="စကားဝှက်">
            <button id="login-existing-btn" class="bg-blue-600 text-white w-full py-3 rounded-lg font-bold mb-2">ဝင်မည်</button>
            <button id="admin-login-trigger" class="w-full bg-gray-800 text-white font-bold py-3 rounded-lg">Admin ဝင်ရောက်ရန်</button>
        </div>

        <!-- Game UI -->
        <div id="game-ui" class="hidden-ui">
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 flex justify-between items-center">
                <div>
                    <p id="current-user-display" class="font-bold"></p>
                    <p class="text-blue-600 font-bold">Coins: <span id="coin-balance">0</span></p>
                </div>
                <button id="logout-btn" class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm">Logout</button>
            </div>

            <div id="admin-panel" class="hidden-ui bg-gray-900 text-white p-6 rounded-2xl mb-6">
                <h3 class="font-bold text-yellow-400 mb-4">Admin Panel</h3>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <button id="reset-game-btn" class="bg-green-600 py-3 rounded-xl font-bold">Reset</button>
                    <button id="calc-result-btn" class="bg-yellow-600 py-3 rounded-xl font-bold">ရလဒ်ထုတ်မည်</button>
                </div>
                <select id="user-select-admin" class="text-black w-full p-3 mb-2 rounded-lg"></select>
                <input type="number" id="coin-amount" class="text-black w-full p-3 mb-2 rounded-lg" placeholder="Amount">
                <div class="flex gap-2">
                    <button id="add-coin-btn" class="flex-1 bg-blue-600 py-2 rounded-lg">Add</button>
                    <button id="sub-coin-btn" class="flex-1 bg-orange-600 py-2 rounded-lg">Sub</button>
                </div>
            </div>

            <div class="grid grid-cols-3 md:grid-cols-6 gap-3" id="animal-grid"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbRZLUYhEvTHoCscb2ul_JURGsfBjCF4s",
            authDomain: "birthday-62720.firebaseapp.com",
            databaseURL: "https://birthday-62720-default-rtdb.firebaseio.com",
            projectId: "birthday-62720",
            storageBucket: "birthday-62720.firebasestorage.app",
            messagingSenderId: "915031456534",
            appId: "1:915031456534:web:816308654f76be33b62e37"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const gameData = ["မြင်း", "ရွှေနဂါး", "လိပ်ပြာ", "ဆတ်", "မြွေ", "မျောက်", "ပင့်ကူ", "ဗျိုင်း", "ငန်း", "ခရု", "ဆင်", "ရွှေငါး", "ကြက်", "လိပ်", "ကျီး", "ကျား", "ဝက်", "ဒေါင်း", "ယုန်", "ခွေး", "ပုစွန်", "ဆိတ်", "နွား", "ဖား", "ပျား", "ကြွက်", "ငါးရှဉ့်", "ကျားသစ်", "ခြင်္သေ့", "သမင်", "ဝံပုလွေ", "လင်းယုန်", "ကြောင်", "ပုရွက်ဆိတ်", "ပိုးကောင်", "ငါး"];

        let users = {};
        let currentUserId = localStorage.getItem('game_uid');
        let isAdmin = localStorage.getItem('is_admin') === 'true';

        db.ref('users').on('value', (snap) => { users = snap.val() || {}; updateUI(); });

        function updateUI() {
            if(currentUserId || isAdmin) {
                document.getElementById('login-screen').classList.add('hidden-ui');
                document.getElementById('game-ui').classList.remove('hidden-ui');
                if(isAdmin) document.getElementById('admin-panel').classList.remove('hidden-ui');
                if(!isAdmin && users[currentUserId]) {
                    document.getElementById('current-user-display').innerText = "User: " + users[currentUserId].name;
                    document.getElementById('coin-balance').innerText = users[currentUserId].balance || 0;
                }
            } else {
                document.getElementById('login-screen').classList.remove('hidden-ui');
                document.getElementById('game-ui').classList.add('hidden-ui');
            }
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('animal-grid');
            grid.innerHTML = '';
            gameData.forEach((name, i) => {
                const btn = document.createElement('button');
                btn.className = "p-3 bg-white border rounded shadow text-sm hover:bg-blue-50";
                btn.innerText = name;
                btn.onclick = () => {
                    if(isAdmin || !currentUserId) return;
                    let user = users[currentUserId];
                    if((user.balance || 0) >= 1) {
                        db.ref(`users/${currentUserId}/balance`).set((user.balance || 0) - 1);
                        db.ref(`users/${currentUserId}/selections/${i}`).set(((user.selections && user.selections[i]) || 0) + 1);
                    }
                };
                grid.appendChild(btn);
            });
        }

        document.getElementById('login-existing-btn').onclick = () => {
            const n = document.getElementById('login-name').value.trim();
            const p = document.getElementById('login-pass').value.trim();
            const uid = n.replace(/[^a-z0-9]/gi, '');
            if(users[uid] && users[uid].password === p) { 
                localStorage.setItem('game_uid', uid); 
                currentUserId = uid; 
                updateUI(); 
            }
        };

        document.getElementById('admin-login-trigger').onclick = () => {
            if(prompt("Admin Password:") === 'admin123') { 
                isAdmin = true; 
                localStorage.setItem('is_admin', 'true'); 
                updateUI(); 
            }
        };

        document.getElementById('logout-btn').onclick = () => { localStorage.clear(); location.reload(); };

        updateUI();
    </script>
</body>
</html>
