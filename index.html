<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>တိရစ္ဆာန်လောင်းကစား (၃၆ ကောင်)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .hidden-ui { display: none !important; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div id="app" class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">တိရစ္ဆာန် လောင်းကစား (၃၆ ကောင်)</h1>

        <!-- Login Screen -->
        <div id="login-screen" class="bg-white p-6 rounded-2xl shadow-xl max-w-md mx-auto">
            <h2 class="text-lg font-bold mb-4 text-center">မဝင်ရောက်ရန်</h2>
            <input type="text" id="username-input" class="p-3 border rounded-lg w-full mb-2" placeholder="အမည် (English)">
            <input type="password" id="password-input" class="p-3 border rounded-lg w-full mb-4" placeholder="စကားဝှက်">
            <button id="login-btn" class="bg-blue-600 text-white w-full py-3 rounded-lg font-bold mb-2 hover:bg-blue-700">ဝင်မည် / အကောင့်အသစ်ဆောက်မည်</button>
            <button id="admin-login-btn" class="w-full text-gray-500 underline text-sm mt-2">Admin ဝင်ရောက်ရန်</button>
        </div>

        <!-- Game UI -->
        <div id="game-ui" class="hidden-ui">
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 flex justify-between items-center">
                <div>
                    <p id="user-display" class="font-bold text-gray-700"></p>
                    <p class="text-blue-600 font-bold text-lg">Coins: <span id="coin-balance">0</span></p>
                </div>
                <button id="logout-btn" class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm hover:bg-red-600">Logout</button>
            </div>

            <!-- Admin Panel -->
            <div id="admin-panel" class="hidden-ui bg-gray-800 text-white p-4 rounded-xl mb-4">
                <h3 class="font-bold text-yellow-400 mb-2">Admin Panel</h3>
                <input type="text" id="admin-target-user" placeholder="User Name" class="text-black p-2 rounded mb-2 w-full">
                <input type="number" id="admin-coin-val" placeholder="Coin" class="text-black p-2 rounded mb-2 w-full">
                <div class="flex gap-2">
                    <button id="admin-add" class="bg-green-600 px-4 py-2 rounded font-bold">ထည့်</button>
                    <button id="admin-sub" class="bg-red-600 px-4 py-2 rounded font-bold">နုတ်</button>
                </div>
            </div>

            <div id="result-box" class="hidden-ui bg-yellow-100 p-4 rounded-xl text-center font-bold text-lg mb-4 text-yellow-800 border border-yellow-300"></div>

            <div class="grid grid-cols-4 md:grid-cols-6 gap-2" id="animal-grid"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbRZLUYhEvTHoCscb2ul_JURGsfBjCF4s",
            authDomain: "birthday-62720.firebaseapp.com",
            databaseURL: "https://birthday-62720-default-rtdb.firebaseio.com",
            projectId: "birthday-62720",
            storageBucket: "birthday-62720.firebasestorage.app",
            messagingSenderId: "915031456534",
            appId: "1:915031456534:web:816308654f76be33b62e37"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const animals = ["မြင်း", "တော", "ရွှေနဂါး", "လိပ်ပြာ", "ဆတ်", "မြွေ", "မျောက်", "ပင့်ကူ", "ဗျိုင်း", "သီလ", "ငန်း", "ခရု", "ဆင်", "ရွှေငါး", "ကြက်", "လိပ်", "ကျီး", "ငှက်", "ကျား", "ဝက်", "ဒေါင်း", "ယုန်", "ခွေး", "ပုစွန်", "နဂါးပျံ", "ဆိတ်", "နွား", "အိမ်", "တီ", "ငွေငါး", "ခို", "ဖား", "ပျား", "ကျောက်", "ကြွက်", "ငါးရှဉ့်"];

        let currentUser = localStorage.getItem('game_uid');
        let isAdmin = localStorage.getItem('is_admin') === 'true';

        if(currentUser) showGame();

        document.getElementById('login-btn').onclick = async () => {
            const name = document.getElementById('username-input').value.trim();
            const pass = document.getElementById('password-input').value.trim();
            if(!name || !pass) return alert("အချက်အလက်ဖြည့်ပါ");

            const ref = db.ref('users/' + name);
            const snap = await ref.once('value');
            let data = snap.val();

            if(!data) {
                await ref.set({ balance: 100, pass: pass, bets: {} });
                currentUser = name;
                localStorage.setItem('game_uid', name);
                showGame();
            } else {
                if (data.pass === pass) {
                    currentUser = name;
                    localStorage.setItem('game_uid', name);
                    showGame();
                } else {
                    alert("စကားဝှက်မှားနေသည်");
                }
            }
        };

        document.getElementById('admin-login-btn').onclick = () => {
            if(prompt("Admin Password:") === 'admin123') {
                isAdmin = true;
                localStorage.setItem('is_admin', 'true');
                showGame();
            }
        };

        function showGame() {
            document.getElementById('login-screen').classList.add('hidden-ui');
            document.getElementById('game-ui').classList.remove('hidden-ui');
            if(isAdmin) document.getElementById('admin-panel').classList.remove('hidden-ui');
            renderGrid();
            updateBalance();
        }

        function updateBalance() {
            if(!currentUser) return;
            db.ref('users/' + currentUser + '/balance').on('value', snap => {
                document.getElementById('coin-balance').innerText = snap.val() || 0;
            });
            document.getElementById('user-display').innerText = "User: " + currentUser;
        }

        function renderGrid() {
            const grid = document.getElementById('animal-grid');
            grid.innerHTML = '';
            animals.forEach((name, i) => {
                const btn = document.createElement('button');
                btn.className = "p-3 bg-white border rounded-lg shadow-sm text-center hover:bg-blue-50 transition active:scale-95";
                btn.innerHTML = `<div class="font-medium">${name}</div>`;
                btn.onclick = () => placeBet(i);
                grid.appendChild(btn);
            });
        }

        async function placeBet(idx) {
            if(isAdmin || !currentUser) return;
            const ref = db.ref('users/' + currentUser);
            
            // Transaction ensuring atomicity
            ref.transaction(user => {
                if(user && (user.balance || 0) >= 1) {
                    if(!user.balance) user.balance = 0;
                    user.balance -= 1;
                    if(!user.bets) user.bets = {};
                    user.bets[idx] = (user.bets[idx] || 0) + 1;
                    return user;
                }
                return; // Abort
            }, (error, committed) => {
                if(error) {
                    alert("အမှားဖြစ်သွားသည်၊ ပြန်ကြိုးစားကြည့်ပါ");
                } else if(!committed) {
                    alert("Coin မလုံလောက်ပါ");
                }
            });
        }

        document.getElementById('admin-add').onclick = () => {
            const name = document.getElementById('admin-target-user').value.trim();
            const val = parseInt(document.getElementById('admin-coin-val').value);
            if(name && val) db.ref('users/' + name + '/balance').transaction(b => (b || 0) + val);
        };

        document.getElementById('admin-sub').onclick = () => {
            const name = document.getElementById('admin-target-user').value.trim();
            const val = parseInt(document.getElementById('admin-coin-val').value);
            if(name && val) db.ref('users/' + name + '/balance').transaction(b => Math.max(0, (b || 0) - val));
        };

        document.getElementById('logout-btn').onclick = () => {
            localStorage.clear();
            location.reload();
        };
    </script>
</body>
</html>
