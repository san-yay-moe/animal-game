<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>တိရစ္ဆာန်လောင်းကစား (၃၆ ကောင်)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .hidden-ui { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 flex items-center justify-center">
    <div id="app" class="max-w-xl w-full bg-white p-6 rounded-xl shadow-lg border">
        <h1 class="text-xl font-bold text-center mb-6">တိရစ္ဆာန် လောင်းကစား (၃၆ ကောင်)</h1>
        
        <div id="login-screen">
            <h2 class="text-center font-bold mb-4">User/Admin Login</h2>
            <input type="text" id="user-name" class="w-full p-3 border rounded mb-2" placeholder="အမည်">
            <input type="password" id="user-pass" class="w-full p-3 border rounded mb-4" placeholder="စကားဝှက်">
            <button id="login-btn" class="w-full bg-green-600 text-white p-3 rounded mb-2 font-bold">User အဖြစ် ဝင်ရောက်ရန်</button>
            <button id="admin-login-btn" class="w-full bg-gray-800 text-white p-3 rounded font-bold">Admin အဖြစ် ဝင်ရောက်ရန်</button>
        </div>

        <div id="game-ui" class="hidden-ui">
            <div class="flex justify-between items-center mb-4 bg-gray-100 p-3 rounded">
                <span id="user-display" class="font-bold text-blue-600">...</span>
                <button id="logout-btn" class="bg-red-500 text-white px-4 py-1 rounded">Logout</button>
            </div>
            <div id="animal-grid" class="grid grid-cols-4 sm:grid-cols-6 gap-2"></div>
        </div>
    </div>

    <script>
        // သေချာစစ်ဆေးပါ: သင့် Firebase Console ထဲက config နဲ့ တူညီရပါမယ်
        const firebaseConfig = {
            apiKey: "AIzaSyBbRZLUYhEVThOCscb2uL_JURGsfBjCF4s",
            authDomain: "birthday-62720.firebaseapp.com",
            databaseURL: "https://birthday-62720-default-rtdb.firebaseio.com",
            projectId: "birthday-62720",
            storageBucket: "birthday-62720.firebasestorage.app",
            messagingSenderId: "915031456534",
            appId: "1:915031456534:web:816308654f76be33b62e37"
        };
        
        try {
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();

            const animals = ["မြင်း", "ရွှေနဂါး", "လိပ်ပြာ", "ဆတ်", "မြွေ", "မျောက်", "ပင့်ကူ", "ဗျိုင်း", "ငန်း", "ခရု", "ဆင်", "ရွှေငါး", "ကြက်", "လိပ်", "ကျီး", "ကျား", "ဝက်", "ဒေါင်း", "ယုန်", "ခွေး", "ပုစွန်", "ဆိတ်", "နွား", "ဖား", "ပျား", "ကြွက်", "ငါးရှဉ့်", "ကျားသစ်", "ခြင်္သေ့", "သမင်", "ဝံပုလွေ", "လင်းယုန်", "ကြောင်", "ပုရွက်ဆိတ်", "ပိုးကောင်", "ငါး"];
            
            document.getElementById('login-btn').onclick = async () => {
                const name = document.getElementById('user-name').value.trim();
                if(!name) return alert("အမည်ထည့်ပါ");
                
                try {
                    const userRef = db.ref('users/' + name);
                    const snap = await userRef.once('value');
                    const data = snap.val();
                    
                    if(!data) {
                        await userRef.set({ balance: 100 });
                    }

                    document.getElementById('login-screen').classList.add('hidden-ui');
                    document.getElementById('game-ui').classList.remove('hidden-ui');
                    document.getElementById('user-display').innerText = "Hello " + name + " | Coin: " + (data ? data.balance : 100);
                    renderGrid();
                } catch (e) {
                    console.error("Firebase Error: ", e);
                    alert("Database ထဲဝင်လို့မရဘူး - Rule တွေကို စစ်ဆေးပေးပါ။");
                }
            };

            function renderGrid() {
                const grid = document.getElementById('animal-grid');
                grid.innerHTML = '';
                animals.forEach(a => {
                    const btn = document.createElement('button');
                    btn.className = "p-2 bg-white border rounded shadow-sm text-xs hover:bg-blue-50 cursor-pointer";
                    btn.innerText = a;
                    btn.onclick = () => alert(a + " ကို ရွေးချယ်လိုက်ပါပြီ");
                    grid.appendChild(btn);
                });
            }

            document.getElementById('logout-btn').onclick = () => location.reload();
        } catch (err) {
            console.error("Initialization error:", err);
        }
    </script>
</body>
</html>
