<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>တိရစ္ဆာန်လောင်းကစား (၃၆ ကောင်)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .hidden-ui { display: none !important; }
        .bet-badge { position: absolute; top: -5px; right: -5px; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div id="app" class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">တိရစ္ဆာန် လောင်းကစား (၃၆ ကောင်)</h1>

        <!-- Login Screen -->
        <div id="login-screen" class="bg-white p-6 rounded-2xl shadow-xl max-w-md mx-auto">
            <h2 class="text-lg font-bold mb-4 text-center">ဝင်ရောက်ရန်</h2>
            <div id="user-list" class="grid grid-cols-2 gap-2 mb-6"></div>
            <div class="border-t pt-4">
                <input type="text" id="new-user-name" class="p-3 border rounded-lg w-full mb-2" placeholder="အမည် (English)">
                <input type="password" id="new-user-pass" class="p-3 border rounded-lg w-full mb-2" placeholder="စကားဝှက်">
                <button id="add-user-btn" class="bg-green-600 text-white w-full py-3 rounded-lg font-bold hover:bg-green-700 transition">User အသစ်ဖန်တီးမည်</button>
            </div>
            <button id="admin-login-trigger" class="w-full mt-4 bg-gray-800 text-white font-bold py-3 rounded-lg hover:bg-gray-900 transition">Admin ဝင်ရောက်ရန်</button>
        </div>

        <!-- Game UI -->
        <div id="game-ui" class="hidden-ui">
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 flex justify-between items-center border border-gray-100">
                <div>
                    <p id="current-user-display" class="font-bold text-gray-700"></p>
                    <p class="text-blue-600 font-bold text-lg">Coins: <span id="coin-balance">0</span></p>
                </div>
                <button id="logout-btn" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg font-bold text-sm hover:bg-red-100 transition">Logout</button>
            </div>

            <!-- Admin Panel -->
            <div id="admin-panel" class="hidden-ui bg-gray-900 text-white p-6 rounded-2xl mb-6 shadow-xl">
                <h3 class="font-bold text-yellow-400 mb-4 text-lg">Admin Panel</h3>
                <div class="pt-4 border-t border-gray-700">
                    <select id="user-select-admin" class="text-black w-full p-3 mb-3 rounded-lg"></select>
                    <input type="number" id="coin-amount" class="text-black w-full p-3 mb-3 rounded-lg" placeholder="Coin ပမာဏ">
                    <div class="flex gap-3">
                        <button id="add-coin-btn" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold">ထည့်</button>
                        <button id="sub-coin-btn" class="flex-1 bg-orange-600 py-3 rounded-xl font-bold">နုတ်</button>
                    </div>
                </div>
            </div>

            <div class="bg-blue-50 p-4 rounded-xl text-center font-bold mb-6 border border-blue-100">
                အချိန် - <span id="timer-display" class="text-blue-800 text-2xl font-mono">--:--</span>
            </div>

            <div id="result-display" class="hidden-ui bg-yellow-100 p-4 rounded-xl text-center font-bold text-lg mb-6 border border-yellow-300"></div>

            <div class="grid grid-cols-4 md:grid-cols-6 gap-3" id="animal-grid"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbRZLUYhEvTHoCscb2ul_JURGsfBjCF4s",
            authDomain: "birthday-62720.firebaseapp.com",
            databaseURL: "https://birthday-62720-default-rtdb.firebaseio.com",
            projectId: "birthday-62720",
            storageBucket: "birthday-62720.firebasestorage.app",
            messagingSenderId: "915031456534",
            appId: "1:915031456534:web:816308654f76be33b62e37"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const gameData = ["မြင်း", "ရွှေနဂါး", "လိပ်ပြာ", "ဆတ်", "မြွေ", "မျောက်", "ပင့်ကူ", "ဗျိုင်း", "ငန်း", "ခရု", "ဆင်", "ရွှေငါး", "ကြက်", "လိပ်", "ကျီး", "ကျား", "ဝက်", "ဒေါင်း", "ယုန်", "ခွေး", "ပုစွန်", "ဆိတ်", "နွား", "ဖား", "ပျား", "ကြွက်", "ငါးရှဉ့်", "ကျားသစ်", "ခြင်္သေ့", "သမင်", "ဝံပုလွေ", "လင်းယုန်", "ကြောင်", "ပုရွက်ဆိတ်", "ပိုးကောင်", "ငါး"];

        let users = {};
        let adminState = { nextReveal: Date.now() + 180000, lastWinnerIdx: -1, isOpen: true };
        let currentUserId = localStorage.getItem('game_uid');
        let isAdmin = localStorage.getItem('is_admin') === 'true';

        db.ref('users').on('value', (snap) => { users = snap.val() || {}; updateUI(); });
        db.ref('adminState').on('value', (snap) => { adminState = snap.val() || adminState; updateUI(); });

        setInterval(() => {
            const display = document.getElementById('timer-display');
            if(!display) return;
            const diff = adminState.nextReveal - Date.now();
            if (diff > 0) {
                const mins = Math.floor(diff / 60000);
                const secs = Math.floor((diff % 60000) / 1000);
                display.innerText = `${mins}:${secs < 10 ? '0' + secs : secs}`;
            } else {
                if (isAdmin) calculateAndProcessWinner();
                display.innerText = "ရလဒ်ထွက်နေသည်...";
            }
        }, 1000);

        function calculateAndProcessWinner() {
            let animalTotals = new Array(36).fill(0);
            let totalBets = 0;
            Object.values(users).forEach(user => {
                if(user.selections) {
                    Object.entries(user.selections).forEach(([idx, count]) => {
                        const c = parseInt(count);
                        animalTotals[parseInt(idx)] += c;
                        totalBets += c;
                    });
                }
            });

            let winnerIdx;
            if (totalBets <= 30) {
                let zeroCandidates = animalTotals.map((val, idx) => val === 0 ? idx : -1).filter(idx => idx !== -1);
                winnerIdx = zeroCandidates.length > 0 ? zeroCandidates[Math.floor(Math.random() * zeroCandidates.length)] : Math.floor(Math.random() * 36);
            } else {
                let minBet = Math.min(...animalTotals);
                let candidates = animalTotals.map((val, idx) => val === minBet ? idx : -1).filter(idx => idx !== -1);
                winnerIdx = candidates[Math.floor(Math.random() * candidates.length)];
            }

            Object.keys(users).forEach(uid => {
                const user = users[uid];
                if(user.selections && user.selections[winnerIdx]) {
                    db.ref(`users/${uid}/balance`).set((user.balance || 0) + (user.selections[winnerIdx] * 27));
                }
                db.ref(`users/${uid}/selections`).set({});
            });
            db.ref('adminState').update({ nextReveal: Date.now() + 180000, lastWinnerIdx: winnerIdx });
        }

        function updateUI() {
            const loginScreen = document.getElementById('login-screen');
            const gameUI = document.getElementById('game-ui');
            const adminPanel = document.getElementById('admin-panel');

            if(currentUserId || isAdmin) {
                loginScreen.classList.add('hidden-ui');
                gameUI.classList.remove('hidden-ui');
                if(isAdmin) adminPanel.classList.remove('hidden-ui');
                if(!isAdmin && users[currentUserId]) {
                    document.getElementById('current-user-display').innerText = "User: " + users[currentUserId].name;
                    document.getElementById('coin-balance').innerText = users[currentUserId].balance || 0;
                }
            } else {
                loginScreen.classList.remove('hidden-ui');
                gameUI.classList.add('hidden-ui');
            }
            
            if(adminState.lastWinnerIdx !== -1) {
                document.getElementById('result-display').classList.remove('hidden-ui');
                document.getElementById('result-display').innerText = "အနိုင်ရသူ - " + gameData[adminState.lastWinnerIdx];
            } else {
                document.getElementById('result-display').classList.add('hidden-ui');
            }
            renderGrid();
            renderUserList();
            if(isAdmin) renderAdminPanel();
        }

        function renderUserList() {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            Object.keys(users).forEach(uid => {
                const btn = document.createElement('button');
                btn.className = "bg-white p-3 border rounded-lg shadow-sm text-sm hover:bg-gray-50 text-left font-bold";
                btn.innerText = users[uid].name;
                btn.onclick = () => {
                    const pass = prompt("Password:");
                    if(pass === users[uid].password) {
                        localStorage.setItem('game_uid', uid);
                        currentUserId = uid;
                        updateUI();
                    } else { alert("Password မှားနေသည်"); }
                };
                list.appendChild(btn);
            });
        }

        function renderAdminPanel() {
            const sel = document.getElementById('user-select-admin');
            sel.innerHTML = '';
            Object.keys(users).forEach(uid => {
                const opt = document.createElement('option');
                opt.value = uid; opt.innerText = users[uid].name;
                sel.appendChild(opt);
            });
        }

        function renderGrid() {
            const grid = document.getElementById('animal-grid');
            grid.innerHTML = '';
            const user = users[currentUserId];
            gameData.forEach((name, i) => {
                const betCount = (user && user.selections) ? (user.selections[i] || 0) : 0;
                const div = document.createElement('div');
                div.className = "relative p-4 bg-white border rounded-xl shadow-sm text-sm text-center cursor-pointer hover:bg-blue-50 transition border-gray-200";
                div.innerHTML = `${name} ${betCount > 0 ? `<div class="bet-badge bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold">${betCount}</div>` : ''}`;
                div.onclick = () => {
                    if (isAdmin || !currentUserId || adminState.nextReveal <= Date.now()) return;
                    if ((user.balance || 0) < 1) return;
                    db.ref(`users/${currentUserId}/balance`).set((user.balance || 0) - 1);
                    db.ref(`users/${currentUserId}/selections/${i}`).set((betCount + 1));
                };
                grid.appendChild(div);
            });
        }

        document.getElementById('add-user-btn').onclick = () => {
            const n = document.getElementById('new-user-name').value.trim();
            const p = document.getElementById('new-user-pass').value.trim();
            if(!n || !p) return;
            const uid = n.replace(/[^a-z0-9]/gi, '');
            db.ref('users/' + uid).set({name: n, password: p, balance: 100, selections: {}});
            localStorage.setItem('game_uid', uid);
            currentUserId = uid;
            updateUI();
        };

        document.getElementById('admin-login-trigger').onclick = () => {
            if(prompt("Admin Password:") === 'admin123') { 
                isAdmin = true; localStorage.setItem('is_admin', 'true');
                updateUI(); 
            }
        };

        document.getElementById('logout-btn').onclick = () => {
            localStorage.removeItem('game_uid'); localStorage.removeItem('is_admin');
            location.reload();
        };

        document.getElementById('add-coin-btn').onclick = () => {
            const uid = document.getElementById('user-select-admin').value;
            const amt = parseInt(document.getElementById('coin-amount').value);
            if(amt && users[uid]) db.ref(`users/${uid}/balance`).set((users[uid].balance || 0) + amt);
        };

        document.getElementById('sub-coin-btn').onclick = () => {
            const uid = document.getElementById('user-select-admin').value;
            const amt = parseInt(document.getElementById('coin-amount').value);
            if(amt && users[uid]) db.ref(`users/${uid}/balance`).set((users[uid].balance || 0) - amt);
        };
        
        updateUI();
    </script>
</body>
</html>
