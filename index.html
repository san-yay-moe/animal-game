<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>တိရစ္ဆာန်လောင်းကစား (၃၆ ကောင်)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .hidden-ui { display: none !important; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .cork-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; }
        .admin-bg { background-color: #0e1726; }
    </style>
</head>
<body class="h-screen overflow-hidden text-slate-800">
    <div id="message-box" class="fixed top-5 right-5 z-[100] hidden p-4 rounded-xl shadow-lg text-white font-semibold text-sm"></div>

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-100">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-200 max-w-sm w-full">
            <h1 class="text-2xl font-black text-slate-900 mb-6 text-center">36 Animal Game</h1>
            <div class="mb-4 space-y-3">
                <input type="text" id="login-name" class="p-3 bg-slate-50 border border-slate-200 rounded-lg w-full focus:ring-2 focus:ring-blue-600 outline-none transition" placeholder="အမည် (User ID)">
                <input type="password" id="login-pass" class="p-3 bg-slate-50 border border-slate-200 rounded-lg w-full focus:ring-2 focus:ring-blue-600 outline-none transition" placeholder="စကားဝှက်">
                <button id="login-existing-btn" class="bg-blue-600 text-white w-full py-3 rounded-lg font-bold hover:bg-blue-700 transition shadow-sm">ဝင်မည်</button>
            </div>
            <button id="admin-login-trigger" class="w-full text-slate-400 text-xs hover:text-slate-600 transition">Admin ဝင်ရောက်ရန်</button>
        </div>
    </div>

    <!-- Game UI -->
    <div id="game-ui" class="hidden-ui flex flex-col md:flex-row h-screen">
        
        <!-- Sidebar -->
        <div class="w-full md:w-80 bg-white border-r border-slate-200 flex-shrink-0 p-6 overflow-y-auto flex flex-col gap-6">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-md flex items-center justify-center text-white font-bold">36</div>
                <h1 class="text-lg font-black text-slate-900">Dashboard</h1>
            </div>
            
            <div class="cork-card p-4 border-l-4 border-l-blue-600">
                <p id="current-user-display" class="font-bold text-slate-400 text-[10px] uppercase tracking-wider"></p>
                <p class="text-2xl font-black text-slate-900"><span id="coin-balance" class="text-blue-600">0</span> <span class="text-sm font-medium text-slate-400">Coins</span></p>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <button id="open-chat-btn" class="bg-slate-100 text-slate-600 py-2.5 rounded-lg font-semibold text-xs hover:bg-slate-200 transition">💬 Chat</button>
                <button id="open-private-chat-btn" class="bg-purple-50 text-purple-600 py-2.5 rounded-lg font-semibold text-xs hover:bg-purple-100 transition">🔒 Admin</button>
                <button id="logout-btn" class="col-span-2 bg-red-50 text-red-600 py-2.5 rounded-lg font-semibold text-xs hover:bg-red-100 transition">Logout</button>
            </div>

            <div class="cork-card p-4">
                <h4 class="font-bold text-slate-400 text-[10px] uppercase mb-1">လက်ရှိလောင်းထားမှု</h4>
                <p class="text-lg font-black text-slate-900"><span id="current-bet-count" class="text-red-500">0</span> <span class="text-xs text-slate-400">coins</span></p>
                <div id="win-loss-status" class="text-[10px] font-bold mt-2 text-slate-400">စောင့်ဆိုင်းနေသည်...</div>
            </div>

            <div class="bg-slate-900 p-4 rounded-xl text-white mt-auto">
                <h4 class="font-bold text-slate-500 text-[10px] uppercase mb-1">အချိန်</h4>
                <span id="timer-display" class="text-3xl font-black font-mono tracking-tighter">--:--</span>
            </div>
        </div>

        <!-- Main Area -->
        <div class="flex-1 p-8 overflow-y-auto">
            <div id="result-display" class="hidden-ui bg-yellow-400 p-4 rounded-xl text-center font-bold text-sm mb-6 shadow-md text-yellow-900 border-2 border-yellow-500"></div>
            <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-3" id="animal-grid"></div>
        </div>

        <!-- Modals -->
        <div id="chat-modal" class="hidden-ui fixed inset-0 z-[110] flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm">
            <div class="bg-white p-6 rounded-2xl w-full max-w-lg border border-slate-200 shadow-2xl">
                <div class="flex justify-between items-center mb-4">
                    <h4 class="font-bold text-slate-900">Chat</h4>
                    <button id="close-chat-btn" class="text-gray-400 hover:text-gray-800">✕</button>
                </div>
                <div id="chat-messages" class="h-60 overflow-y-auto mb-4 space-y-2 text-sm bg-gray-50 p-4 rounded-xl"></div>
                <div class="flex gap-2">
                    <input type="text" id="chat-input" class="flex-grow p-4 bg-gray-100 border-none rounded-xl" placeholder="စာရိုက်ပါ...">
                    <button id="send-chat-btn" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold">ပို့</button>
                </div>
            </div>
        </div>

        <div id="private-chat-modal" class="hidden-ui fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
            <div class="bg-white p-6 rounded-3xl shadow-2xl border border-gray-100 w-full max-w-lg">
                <div class="flex justify-between items-center mb-4">
                    <h4 class="font-bold text-purple-500 text-xs uppercase" id="private-chat-title">Admin Chat</h4>
                    <button id="close-private-chat-btn" class="text-gray-400 hover:text-gray-800">✕</button>
                </div>
                <div id="private-chat-messages" class="h-60 overflow-y-auto mb-4 space-y-2 text-sm bg-gray-50 p-4 rounded-2xl"></div>
                <div class="flex gap-2">
                    <input type="text" id="private-chat-input" class="flex-grow p-4 bg-gray-100 border-none rounded-xl focus:ring-2 focus:ring-purple-500" placeholder="စာရိုက်ပါ...">
                    <button id="send-private-chat-btn" class="bg-purple-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-purple-700">ပို့</button>
                </div>
            </div>
        </div>

        <div id="admin-panel" class="hidden-ui w-full md:w-80 bg-gray-900 text-white p-6 overflow-y-auto h-screen border-l border-white/10 flex-shrink-0">
            <h3 class="font-bold text-yellow-400 mb-6 text-xl tracking-tight">Admin Control</h3>
            <div class="mb-6 flex flex-wrap gap-2 justify-center">
                <button class="timer-btn w-12 h-12 rounded-full border-2 border-yellow-400 text-yellow-400 font-bold hover:bg-yellow-400 hover:text-black transition" onclick="setTimer(1)">1</button>
                <button class="timer-btn w-12 h-12 rounded-full border-2 border-yellow-400 text-yellow-400 font-bold hover:bg-yellow-400 hover:text-black transition" onclick="setTimer(3)">3</button>
                <button class="timer-btn w-12 h-12 rounded-full border-2 border-yellow-400 text-yellow-400 font-bold hover:bg-yellow-400 hover:text-black transition" onclick="setTimer(5)">5</button>
                <button class="timer-btn w-12 h-12 rounded-full border-2 border-yellow-400 text-yellow-400 font-bold hover:bg-yellow-400 hover:text-black transition" onclick="setTimer(10)">10</button>
                <button class="timer-btn w-12 h-12 rounded-full border-2 border-yellow-400 text-yellow-400 font-bold hover:bg-yellow-400 hover:text-black transition" onclick="setTimer(30)">30</button>
            </div>
            <div class="grid grid-cols-1 gap-4 mb-6">
                <button id="reset-game-btn" class="bg-green-600 py-4 rounded-2xl font-bold hover:bg-green-700 transition">Reset</button>
                <button id="calc-result-btn" class="bg-yellow-600 py-4 rounded-2xl font-bold hover:bg-yellow-700 transition">ရလဒ်ထုတ်</button>
            </div>
            <div class="grid grid-cols-1 gap-4 mb-4">
                <div id="bets-list-container" class="bg-white/10 p-4 rounded-2xl text-sm max-h-60 overflow-y-auto border border-white/10">
                    <h4 class="font-bold mb-2 text-yellow-400">လောင်းထားသူများ:</h4>
                    <div id="bets-list-content"></div>
                </div>
                <div id="user-balance-list" class="bg-white/10 p-4 rounded-2xl text-sm max-h-60 overflow-y-auto border border-white/10">
                    <h4 class="font-bold mb-2 text-yellow-400">User များ၏ Coins:</h4>
                    <div id="user-balance-content"></div>
                </div>
            </div>
            <div class="flex flex-col gap-2 mb-2">
                <input type="text" id="new-password-admin" class="text-black p-3 rounded-xl w-full" placeholder="New Password">
                <button id="change-pass-btn" class="bg-purple-600 px-4 py-3 rounded-xl font-bold">Pass ပြင်</button>
            </div>
            <div class="flex flex-col gap-2">
                <select id="user-select-admin" class="text-black p-3 rounded-xl w-full"></select>
                <div class="flex gap-2">
                    <input type="number" id="coin-amount" class="text-black p-3 rounded-xl w-24" placeholder="Coin">
                    <button id="add-coin-btn" class="bg-blue-600 px-4 py-3 rounded-xl font-bold">+</button>
                    <button id="sub-coin-btn" class="bg-orange-600 px-4 py-3 rounded-xl font-bold">-</button>
                </div>
                <div class="flex gap-2">
                    <button id="admin-chat-btn" class="bg-purple-600 px-4 py-3 rounded-xl font-bold flex-grow">Chat</button>
                    <button id="delete-user-btn" class="bg-red-600 px-4 py-3 rounded-xl font-bold flex-grow">ဖျက်</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbRZLUYhEvTHoCscb2ul_JURGsfBjCF4s",
            authDomain: "birthday-62720.firebaseapp.com",
            databaseURL: "https://birthday-62720-default-rtdb.firebaseio.com",
            projectId: "birthday-62720",
            storageBucket: "birthday-62720.firebasestorage.app",
            messagingSenderId: "915031456534",
            appId: "1:915031456534:web:816308654f76be33b62e37"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showMsg(text, isError = false) {
            const box = document.getElementById('message-box');
            box.innerText = text;
            box.className = `fixed top-5 right-5 z-[100] p-4 rounded-xl shadow-lg text-white font-semibold text-sm ${isError ? 'bg-red-600' : 'bg-green-600'}`;
            box.classList.remove('hidden-ui');
            setTimeout(() => box.classList.add('hidden-ui'), 3000);
        }

        const gameData = ["မြင်း", "ရွှေနဂါး", "လိပ်ပြာ", "ဆတ်", "မြွေ", "မျောက်", "ပင့်ကူ", "ဗျိုင်း", "ငန်း", "ခရု", "ဆင်", "ရွှေငါး", "ကြက်", "လိပ်", "ကျီး", "ကျား", "ဝက်", "ဒေါင်း", "ယုန်", "ခွေး", "ပုစွန်", "ဆိတ်", "နွား", "ဖား", "ပျား", "ကြွက်", "ငါးရှဉ့်", "ကျားသစ်", "ခြင်္သေ့", "သမင်", "ဝံပုလွေ", "လင်းယုန်", "ကြောင်", "ပုရွက်ဆိတ်", "ပိုးကောင်", "ငါး"];
        const animalEmojis = ["🐎", "🐉", "🦋", "🦌", "🐍", "🐒", "🕷️", "🦢", "🦆", "🐌", "🐘", "🐠", "🐓", "🐢", "🐦‍⬛", "🐅", "🐖", "🦚", "🐇", "🐕", "🦐", "🐐", "🐂", "🐸", "🐝", "🐀", "🐍", "🐆", "🦁", "🦌", "🐺", "🦅", "🐈", "🐜", "🐛", "🐟"];

        let users = {};
        let adminState = { nextReveal: 0, processed: true, lastWinner: "" };
        let currentUserId = localStorage.getItem('game_uid');
        let isAdmin = localStorage.getItem('is_admin') === 'true';
        let selectedMinutes = 3;
        let activePrivateChatUid = null;
        let audioCtx = null; 
        let lastLeader = "";
        let privateChatListener = null;

        document.addEventListener('click', () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }, { once: true });

        function setTimer(m) {
            selectedMinutes = m;
            showMsg(m + " မိနစ် ရွေးချယ်ပြီးပါပြီ");
        }

        db.ref('users').on('value', (snap) => { 
            users = snap.val() || {}; 
            updateUI(); 
            let leaderName = "";
            let maxBets = 0;
            Object.keys(users).forEach(uid => {
                const user = users[uid];
                const total = user.selections ? Object.values(user.selections).reduce((a, b) => a + b, 0) : 0;
                if (total > maxBets) {
                    maxBets = total;
                    leaderName = user.name;
                }
            });
            if (leaderName && leaderName !== lastLeader) {
                lastLeader = leaderName;
                if (currentUserId && users[currentUserId] && users[currentUserId].name !== leaderName) {
                    showMsg("အများဆုံးလောင်းထားသူ: " + leaderName);
                }
            }
        });
        db.ref('adminState').on('value', (snap) => { adminState = snap.val() || { nextReveal: 0, processed: true }; updateUI(); });
        db.ref('chat').limitToLast(20).on('child_added', (snap) => {
            const msg = snap.val();
            const div = document.createElement('div');
            div.className = "border-b border-slate-100 pb-2";
            const timeStr = msg.timestamp ? `<span class="text-[9px] text-slate-400 ml-2">${new Date(msg.timestamp).toLocaleTimeString()}</span>` : '';
            div.innerHTML = `<span class="font-bold text-blue-600">${msg.name}:</span> ${msg.text} ${timeStr}`;
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });

        function openPrivateChat(uid, name) {
            if (activePrivateChatUid && privateChatListener) {
                db.ref('privateChat/' + activePrivateChatUid).off('child_added', privateChatListener);
            }
            activePrivateChatUid = uid;
            document.getElementById('private-chat-title').innerText = "Chat: " + (isAdmin ? name : "Admin");
            document.getElementById('private-chat-messages').innerHTML = '';
            document.getElementById('private-chat-modal').classList.remove('hidden-ui');
            privateChatListener = (snap) => {
                const msg = snap.val();
                const div = document.createElement('div');
                div.className = "border-b border-slate-100 pb-2";
                const isMyMsg = isAdmin ? (msg.sender === 'Admin') : (msg.sender !== 'Admin');
                div.innerHTML = `<span class="font-bold ${isMyMsg ? 'text-purple-600' : 'text-red-600'}">${msg.sender}:</span> ${msg.text}`;
                document.getElementById('private-chat-messages').appendChild(div);
            };
            db.ref('privateChat/' + activePrivateChatUid).limitToLast(20).on('child_added', privateChatListener);
        }

        document.getElementById('send-private-chat-btn').onclick = () => {
            const input = document.getElementById('private-chat-input');
            const text = input.value.trim();
            if(text && activePrivateChatUid) {
                let senderName = isAdmin ? 'Admin' : (users[currentUserId] && users[currentUserId].name ? users[currentUserId].name : currentUserId);
                db.ref('privateChat/' + activePrivateChatUid).push({ sender: senderName, text: text, timestamp: Date.now() });
                input.value = '';
            }
        };

        document.getElementById('open-chat-btn').onclick = () => document.getElementById('chat-modal').classList.remove('hidden-ui');
        document.getElementById('close-chat-btn').onclick = () => document.getElementById('chat-modal').classList.add('hidden-ui');
        document.getElementById('send-chat-btn').onclick = () => {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(text && users[currentUserId]) {
                db.ref('chat').push({ name: users[currentUserId].name, text: text, timestamp: Date.now() });
                input.value = '';
            }
        };

        setInterval(() => {
            const display = document.getElementById('timer-display');
            if(!display) return;
            const diff = adminState.nextReveal - Date.now();
            if (diff > 0) {
                const mins = Math.floor(diff / 60000);
                const secs = Math.floor((diff % 60000) / 1000);
                display.innerText = `${mins}:${secs < 10 ? '0' + secs : secs}`;
            } else {
                display.innerText = "ဂိမ်းရပ်";
                if (!adminState.processed) calculateResults(true);
            }
        }, 1000);

        function calculateResults(isAuto = false) {
            if (adminState.processed) return;
            let totalBets = new Array(gameData.length).fill(0);
            Object.keys(users).forEach(uid => {
                if(users[uid].selections) Object.keys(users[uid].selections).forEach(idx => totalBets[idx] += users[uid].selections[idx]);
            });
            let zeroBetIndices = [];
            totalBets.forEach((val, idx) => { if(val === 0) zeroBetIndices.push(idx); });
            let winnerIdx = zeroBetIndices.length > 0 ? zeroBetIndices[Math.floor(Math.random() * zeroBetIndices.length)] : Math.floor(Math.random() * gameData.length);
            
            Object.keys(users).forEach(uid => {
                const user = users[uid];
                let winnings = (user.selections && user.selections[winnerIdx]) ? (user.selections[winnerIdx] * 27) : 0;
                db.ref(`users/${uid}`).update({ balance: (user.balance || 0) + winnings, selections: null });
            });
            db.ref('adminState').update({ nextReveal: Date.now() + 180000, lastWinner: gameData[winnerIdx], processed: true });
            setTimeout(() => { db.ref('adminState').update({ processed: false }); }, 5000);
        }

        function changeBet(i, delta) {
            const user = users[currentUserId];
            if(!user || adminState.nextReveal <= Date.now()) return;
            const currentBet = (user.selections && user.selections[i]) ? user.selections[i] : 0;
            const balance = Number(user.balance || 0);
            if(delta > 0 && balance >= 1) db.ref(`users/${currentUserId}`).update({ balance: balance - 1, [`selections/${i}`]: currentBet + 1 });
            else if(delta < 0 && currentBet > 0) db.ref(`users/${currentUserId}`).update({ balance: balance + 1, [`selections/${i}`]: currentBet - 1 });
        }

        function renderGrid() {
            const grid = document.getElementById('animal-grid');
            if(!grid || (!currentUserId && !isAdmin)) return;
            grid.innerHTML = '';
            gameData.forEach((name, i) => {
                const betCount = (users[currentUserId] && users[currentUserId].selections) ? (users[currentUserId].selections[i] || 0) : 0;
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col items-center justify-center text-center hover:border-blue-500 cursor-pointer transition";
                div.innerHTML = `
                    <div class="text-3xl mb-2">${animalEmojis[i]}</div>
                    <div class="font-bold text-slate-700 text-[11px] mb-2">${name}</div>
                    ${!isAdmin ? `
                    <div class="flex gap-1 items-center">
                        <button class="w-7 h-7 flex items-center justify-center bg-slate-100 rounded-lg text-red-600 font-bold hover:bg-slate-200" onclick="changeBet(${i}, -1)">-</button>
                        <span class="font-black text-blue-600 w-6 text-sm">${betCount}</span>
                        <button class="w-7 h-7 flex items-center justify-center bg-slate-100 rounded-lg text-green-600 font-bold hover:bg-slate-200" onclick="changeBet(${i}, 1)">+</button>
                    </div>` : ''}
                `;
                grid.appendChild(div);
            });
        }

        function updateUI() {
            if(currentUserId || isAdmin) {
                document.getElementById('login-screen').classList.add('hidden-ui');
                document.getElementById('game-ui').classList.remove('hidden-ui');
                if(users[currentUserId]) {
                    document.getElementById('current-user-display').innerText = "User: " + users[currentUserId].name;
                    document.getElementById('coin-balance').innerText = users[currentUserId].balance || 0;
                    const totalBet = users[currentUserId].selections ? Object.values(users[currentUserId].selections).reduce((a, b) => a + b, 0) : 0;
                    document.getElementById('current-bet-count').innerText = totalBet;
                }
                if(isAdmin) document.getElementById('admin-panel').classList.remove('hidden-ui');
            }
            renderGrid();
        }

        document.getElementById('add-coin-btn').onclick = () => { const uid = document.getElementById('user-select-admin').value; const amt = parseInt(document.getElementById('coin-amount').value); if(uid && amt) db.ref(`users/${uid}/balance`).set((users[uid].balance || 0) + amt); };
        document.getElementById('sub-coin-btn').onclick = () => { const uid = document.getElementById('user-select-admin').value; const amt = parseInt(document.getElementById('coin-amount').value); if(uid && amt) db.ref(`users/${uid}/balance`).set(Math.max(0, (users[uid].balance || 0) - amt)); };
        document.getElementById('delete-user-btn').onclick = () => { const uid = document.getElementById('user-select-admin').value; if(uid) db.ref(`users/${uid}`).remove(); };
        document.getElementById('reset-game-btn').onclick = () => db.ref('adminState').update({ nextReveal: Date.now() + (selectedMinutes * 60000), processed: false });
        document.getElementById('calc-result-btn').onclick = () => calculateResults();
        
        const loginBtn = document.getElementById('login-existing-btn');
        if(loginBtn) loginBtn.onclick = () => { const n = document.getElementById('login-name').value.trim(); const p = document.getElementById('login-pass').value.trim(); const uid = n.replace(/[^a-z0-9]/gi, ''); if(users[uid] && users[uid].password === p) { localStorage.setItem('game_uid', uid); currentUserId = uid; updateUI(); } else showMsg("အမည် သို့မဟုတ် စကားဝှက် မှားနေသည်", true); };
        
        const adminTrigger = document.getElementById('admin-login-trigger');
        if(adminTrigger) adminTrigger.onclick = () => { if(prompt("Admin Password:") === 'admin123') { isAdmin = true; localStorage.setItem('is_admin', 'true'); updateUI(); } };
        
        const logoutBtn = document.getElementById('logout-btn');
        if(logoutBtn) logoutBtn.onclick = () => { localStorage.clear(); location.reload(); };

        updateUI();
    </script>
</body>
</html>
