<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>တိရစ္ဆာန်လောင်းကစား (၃၆ ကောင်)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .hidden-ui { display: none !important; }
        .bet-badge { position: absolute; top: -5px; right: -5px; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div id="message-box" class="fixed top-5 right-5 z-50 hidden"></div>

    <div id="app" class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">တိရစ္ဆာန် လောင်းကစား (၃၆ ကောင်)</h1>

        <!-- Login Screen -->
        <div id="login-screen" class="bg-white p-6 rounded-2xl shadow-xl max-w-md mx-auto">
            <h2 class="text-lg font-bold mb-4 text-center">wအကောင့်ဝင်ရန်</h2>
            <div class="mb-6 space-y-2">
                <input type="text" id="login-name" class="p-3 border rounded-lg w-full" placeholder="အမည် (User ID)">
                <input type="password" id="login-pass" class="p-3 border rounded-lg w-full" placeholder="စကားဝှက်">
                <button id="login-existing-btn" class="bg-blue-600 text-white w-full py-3 rounded-lg font-bold hover:bg-blue-700 transition">ဝင်မည်</button>
            </div>
            
            <h2 class="text-lg font-bold mb-4 text-center border-t pt-4">User အသစ်ဖန်တီးရန်</h2>
            <div class="space-y-2">
                <input type="text" id="new-user-name" class="p-3 border rounded-lg w-full" placeholder="အမည်သစ်">
                <input type="password" id="new-user-pass" class="p-3 border rounded-lg w-full" placeholder="စကားဝှက်">
                <button id="add-user-btn" class="bg-green-600 text-white w-full py-3 rounded-lg font-bold hover:bg-green-700 transition">ဖန်တီးမည်</button>
            </div>
            
            <button id="admin-login-trigger" class="w-full mt-6 bg-gray-800 text-white font-bold py-3 rounded-lg hover:bg-gray-900 transition">Admin ဝင်ရောက်ရန်</button>
        </div>

        <!-- Game UI -->
        <div id="game-ui" class="hidden-ui">
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 flex justify-between items-center border border-gray-100">
                <div>
                    <p id="current-user-display" class="font-bold text-gray-700"></p>
                    <p class="text-blue-600 font-bold text-lg">Coins: <span id="coin-balance">0</span></p>
                </div>
                <button id="logout-btn" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg font-bold text-sm hover:bg-red-100 transition">Logout</button>
            </div>

            <!-- Admin Panel -->
            <div id="admin-panel" class="hidden-ui bg-gray-900 text-white p-6 rounded-2xl mb-6 shadow-xl">
                <h3 class="font-bold text-yellow-400 mb-4 text-lg">Admin Panel</h3>
                <button id="calc-result-btn" class="bg-yellow-600 w-full py-3 rounded-xl font-bold mb-4">အခုချက်ချင်း ရလဒ်ထုတ်မည်</button>
                <select id="user-select-admin" class="text-black w-full p-3 mb-3 rounded-lg"></select>
                <div id="admin-user-balance" class="mb-4 text-center font-bold text-xl bg-gray-800 p-2 rounded text-white">ရွေးထားသူ - 0 Coins</div>
                
                <input type="number" id="coin-amount" class="text-black w-full p-3 mb-3 rounded-lg" placeholder="Coin ပမာဏ">
                <div class="flex gap-3 mb-3">
                    <button id="add-coin-btn" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold">Coin ထည့်</button>
                    <button id="sub-coin-btn" class="flex-1 bg-orange-600 py-3 rounded-xl font-bold">Coin နုတ်</button>
                </div>
            </div>

            <div class="bg-blue-50 p-4 rounded-xl text-center font-bold mb-6 border border-blue-100">
                အချိန် - <span id="timer-display" class="text-blue-800 text-2xl font-mono">--:--</span>
            </div>

            <div id="result-display" class="hidden-ui bg-yellow-100 p-4 rounded-xl text-center font-bold text-lg mb-6 border border-yellow-300"></div>

            <div class="grid grid-cols-3 md:grid-cols-6 gap-3" id="animal-grid"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbRZLUYhEvTHoCscb2ul_JURGsfBjCF4s",
            authDomain: "birthday-62720.firebaseapp.com",
            databaseURL: "https://birthday-62720-default-rtdb.firebaseio.com",
            projectId: "birthday-62720",
            storageBucket: "birthday-62720.firebasestorage.app",
            messagingSenderId: "915031456534",
            appId: "1:915031456534:web:816308654f76be33b62e37"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showMsg(text, isError = false) {
            const box = document.getElementById('message-box');
            box.innerText = text;
            box.className = `fixed top-5 right-5 z-50 p-4 rounded shadow-lg text-white ${isError ? 'bg-red-600' : 'bg-green-600'}`;
            box.classList.remove('hidden-ui');
            setTimeout(() => box.classList.add('hidden-ui'), 3000);
        }

        const gameData = ["မြင်း", "ရွှေနဂါး", "လိပ်ပြာ", "ဆတ်", "မြွေ", "မျောက်", "ပင့်ကူ", "ဗျိုင်း", "ငန်း", "ခရု", "ဆင်", "ရွှေငါး", "ကြက်", "လိပ်", "ကျီး", "ကျား", "ဝက်", "ဒေါင်း", "ယုန်", "ခွေး", "ပုစွန်", "ဆိတ်", "နွား", "ဖား", "ပျား", "ကြွက်", "ငါးရှဉ့်", "ကျားသစ်", "ခြင်္သေ့", "သမင်", "ဝံပုလွေ", "လင်းယုန်", "ကြောင်", "ပုရွက်ဆိတ်", "ပိုးကောင်", "ငါး"];

        let users = {};
        let adminState = { nextReveal: Date.now() + 180000 };
        let currentUserId = localStorage.getItem('game_uid');
        let isAdmin = localStorage.getItem('is_admin') === 'true';

        db.ref('users').on('value', (snap) => { users = snap.val() || {}; updateUI(); });
        db.ref('adminState').on('value', (snap) => { adminState = snap.val() || adminState; updateUI(); });

        setInterval(() => {
            const display = document.getElementById('timer-display');
            if(!display) return;
            const diff = adminState.nextReveal - Date.now();
            
            if (diff <= 0 && !adminState.isProcessing) {
                autoCalculateResult();
            }

            if (diff > 0) {
                const mins = Math.floor(diff / 60000);
                const secs = Math.floor((diff % 60000) / 1000);
                display.innerText = `${mins}:${secs < 10 ? '0' + secs : secs}`;
            } else {
                display.innerText = "ရလဒ်ထွက်နေသည်...";
            }
        }, 1000);

        function autoCalculateResult() {
            if(adminState.isProcessing) return;
            db.ref('adminState/isProcessing').set(true);
            
            let totalBetsPerAnimal = new Array(36).fill(0);
            let grandTotal = 0;

            Object.values(users).forEach(u => {
                if(u.selections) {
                    gameData.forEach((_, i) => {
                        const b = u.selections[i] || 0;
                        totalBetsPerAnimal[i] += b;
                        grandTotal += b;
                    });
                }
            });

            let winnerIdx = grandTotal >= 5 ? totalBetsPerAnimal.indexOf(Math.min(...totalBetsPerAnimal)) : 0;

            Object.keys(users).forEach(uid => {
                const u = users[uid];
                if(u.selections && u.selections[winnerIdx] > 0) {
                    const winAmt = u.selections[winnerIdx] * 36;
                    db.ref(`users/${uid}/balance`).set(Number(u.balance || 0) + winAmt);
                    db.ref(`users/${uid}/lastTurnResult`).set({animal: gameData[winnerIdx], win: winAmt});
                } else {
                    db.ref(`users/${uid}/lastTurnResult`).set({animal: gameData[winnerIdx], win: 0});
                }
                db.ref(`users/${uid}/selections`).remove();
            });

            db.ref('adminState').update({ nextReveal: Date.now() + 180000, isProcessing: false });
        }

        window.changeBet = (i, delta) => {
            const user = users[currentUserId];
            if(!user) return showMsg("ကျေးဇူးပြု၍ Login အရင်ဝင်ပါ", true);
            if(adminState.nextReveal <= Date.now() + 1000) return showMsg("အချိန်ကုန်သွားပါပြီ", true);
            
            const currentBalance = Number(user.balance || 0);
            const currentBets = user.selections || {};
            const currentBet = Number(currentBets[i] || 0);
            
            if(delta > 0) {
                if(currentBalance >= 1) {
                    db.ref(`users/${currentUserId}/balance`).set(currentBalance - 1);
                    db.ref(`users/${currentUserId}/selections/${i}`).set(currentBet + 1);
                } else {
                    showMsg("Coin မလုံလောက်ပါ", true);
                }
            } else {
                if(currentBet > 0) {
                    db.ref(`users/${currentUserId}/balance`).set(currentBalance + 1);
                    db.ref(`users/${currentUserId}/selections/${i}`).set(currentBet - 1);
                }
            }
        };

        function renderGrid() {
            const grid = document.getElementById('animal-grid');
            if(!grid || (!currentUserId && !isAdmin)) return;
            grid.innerHTML = '';
            
            gameData.forEach((name, i) => {
                const betCount = (users[currentUserId] && users[currentUserId].selections) ? (users[currentUserId].selections[i] || 0) : 0;
                const div = document.createElement('div');
                div.className = "bg-white p-3 rounded-xl shadow-sm text-center border relative";
                
                if (!isAdmin) {
                    div.innerHTML = `<div class="font-bold text-sm mb-2">${name}</div>
                        <div class="flex gap-1 justify-center">
                            <button onclick="window.changeBet(${i}, -1)" class="w-8 h-8 bg-red-100 rounded text-red-700 font-bold">-</button>
                            <span class="w-8 font-bold text-lg">${betCount}</span>
                            <button onclick="window.changeBet(${i}, 1)" class="w-8 h-8 bg-green-100 rounded text-green-700 font-bold">+</button>
                        </div>`;
                } else {
                    div.innerHTML = `<div class="font-bold text-sm">${name}</div>`;
                }
                grid.appendChild(div);
            });
        }

        function updateUI() {
            if(currentUserId && !users[currentUserId] && !isAdmin) { localStorage.removeItem('game_uid'); currentUserId = null; }

            if(currentUserId || isAdmin) {
                document.getElementById('login-screen').classList.add('hidden-ui');
                document.getElementById('game-ui').classList.remove('hidden-ui');
                
                if(isAdmin) {
                    document.getElementById('admin-panel').classList.remove('hidden-ui');
                    const select = document.getElementById('user-select-admin');
                    select.innerHTML = Object.keys(users).map(uid => `<option value="${uid}">${users[uid].name}</option>`).join('');
                }

                if(!isAdmin && users[currentUserId]) {
                    document.getElementById('current-user-display').innerText = "User: " + users[currentUserId].name;
                    document.getElementById('coin-balance').innerText = users[currentUserId].balance || 0;
                    
                    if(users[currentUserId].lastTurnResult) {
                        const res = users[currentUserId].lastTurnResult;
                        document.getElementById('result-display').classList.remove('hidden-ui');
                        document.getElementById('result-display').innerHTML = `<p class="text-xl">အနိုင်ရ - ${res.animal}</p><p class="font-bold text-2xl text-green-600">ရရှိ - ${res.win} Coins</p>`;
                    }
                }
            } else {
                document.getElementById('login-screen').classList.remove('hidden-ui');
                document.getElementById('game-ui').classList.add('hidden-ui');
            }
            renderGrid();
        }

        document.getElementById('add-user-btn').onclick = async () => {
            const n = document.getElementById('new-user-name').value.trim();
            const p = document.getElementById('new-user-pass').value.trim();
            if(!n || !p) return showMsg("ဖြည့်စွက်ပါ", true);
            const uid = n.replace(/[^a-z0-9]/gi, '');
            await db.ref('users/' + uid).set({ name: n, password: p, balance: 100, selections: {} });
            localStorage.setItem('game_uid', uid);
            currentUserId = uid;
            updateUI();
        };

        document.getElementById('login-existing-btn').onclick = () => {
            const name = document.getElementById('login-name').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            if(!users[name] || users[name].password !== pass) return showMsg("အချက်အလက်မှားယွင်းနေသည်", true);
            localStorage.setItem('game_uid', name);
            currentUserId = name;
            updateUI();
        };

        document.getElementById('logout-btn').onclick = () => {
            localStorage.removeItem('game_uid');
            location.reload();
        };

        document.getElementById('calc-result-btn').onclick = autoCalculateResult;
        updateUI();
    </script>
</body>
</html>
