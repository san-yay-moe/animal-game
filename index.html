<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>တိရစ္ဆာန်လောင်းကစား (၃၆ ကောင်)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .hidden-ui { display: none !important; }
        .bet-badge { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; border-radius: 50%; width: 22px; height: 22px; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div id="app" class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">တိရစ္ဆာန် လောင်းကစား (၃၆ ကောင်)</h1>

        <!-- Login Screen -->
        <div id="login-screen" class="bg-white p-6 rounded-2xl shadow-xl max-w-md mx-auto">
            <h2 class="text-lg font-bold mb-4 text-center">Uဝင်ရောက်ရန်</h2>
            <div id="user-list" class="grid grid-cols-1 gap-2 mb-6"></div>
            <div class="border-t pt-4">
                <input type="text" id="new-user-name" class="p-3 border rounded-lg w-full mb-2" placeholder="အမည် (ဥပမာ - AungAung)">
                <input type="password" id="new-user-pass" class="p-3 border rounded-lg w-full mb-2" placeholder="စကားဝှက်">
                <button id="add-user-btn" class="bg-green-600 text-white w-full py-3 rounded-lg font-bold">User အသစ်ဖန်တီးမည်</button>
            </div>
            <button id="admin-login-trigger" class="w-full mt-4 bg-gray-800 text-white font-bold py-3 rounded-lg">Admin ဝင်ရောက်ရန်</button>
        </div>

        <!-- Game UI -->
        <div id="game-ui" class="hidden-ui">
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 flex justify-between items-center border">
                <div>
                    <p id="current-user-display" class="font-bold text-gray-700"></p>
                    <p class="text-blue-600 font-bold text-xl">Coins: <span id="coin-balance">0</span></p>
                </div>
                <button id="logout-btn" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg font-bold text-sm">Logout</button>
            </div>

            <!-- Admin Panel -->
            <div id="admin-panel" class="hidden-ui bg-gray-900 text-white p-6 rounded-2xl mb-6 shadow-xl">
                <h3 class="font-bold text-yellow-400 mb-4">Admin Panel (User ဇယား)</h3>
                <div class="overflow-x-auto bg-white text-black rounded-lg mb-4">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-gray-100"><tr><th class="p-2">အမည်</th><th class="p-2">Coin</th><th class="p-2">လောင်းထားမှု</th></tr></thead>
                        <tbody id="admin-user-table"></tbody>
                    </table>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <select id="user-select-admin" class="p-2 text-black rounded"></select>
                    <input type="number" id="coin-adjust-val" class="p-2 text-black rounded" placeholder="ပမာဏ">
                </div>
                <div class="flex gap-2 mt-2">
                    <button id="admin-add-coin" class="bg-blue-600 flex-1 py-2 rounded-lg font-bold">Coin ထည့်</button>
                    <button id="admin-sub-coin" class="bg-orange-600 flex-1 py-2 rounded-lg font-bold">Coin နုတ်</button>
                </div>
            </div>

            <div class="bg-blue-50 p-4 rounded-xl text-center font-bold mb-6 border border-blue-200">
                အချိန် - <span id="timer-display" class="text-blue-800 text-2xl font-mono">--:--</span>
            </div>

            <div id="result-display" class="hidden-ui bg-yellow-100 p-4 rounded-xl text-center font-bold text-lg mb-6 text-yellow-800 border-2 border-yellow-300"></div>

            <div class="grid grid-cols-4 md:grid-cols-6 gap-3" id="animal-grid"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbRZLUYhEvTHoCscb2ul_JURGsfBjCF4s",
            databaseURL: "https://birthday-62720-default-rtdb.firebaseio.com",
            projectId: "birthday-62720",
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const animals = ["မြင်း", "ရွှေနဂါး", "လိပ်ပြာ", "ဆတ်", "မြွေ", "မျောက်", "ပင့်ကူ", "ဗျိုင်း", "ငန်း", "ခရု", "ဆင်", "ရွှေငါး", "ကြက်", "လိပ်", "ကျီး", "ကျား", "ဝက်", "ဒေါင်း", "ယုန်", "ခွေး", "ပုစွန်", "ဆိတ်", "နွား", "ဖား", "ပျား", "ကြွက်", "ငါးရှဉ့်", "ကျားသစ်", "ခြင်္သေ့", "သမင်", "ဝံပုလွေ", "လင်းယုန်", "ကြောင်", "ပုရွက်ဆိတ်", "ပိုးကောင်", "ငါး"];

        let users = {};
        let gameState = { nextReveal: Date.now() + 180000, lastWinnerIdx: -1 };
        let currentUserId = localStorage.getItem('game_uid');
        let isAdmin = localStorage.getItem('is_admin') === 'true';

        db.ref('users').on('value', (snap) => { users = snap.val() || {}; updateUI(); });
        db.ref('gameState').on('value', (snap) => { gameState = snap.val() || gameState; updateUI(); });

        setInterval(() => {
            const diff = gameState.nextReveal - Date.now();
            if (diff > 0) {
                const mins = Math.floor(diff / 60000);
                const secs = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer-display').innerText = `${mins}:${secs < 10 ? '0' + secs : secs}`;
            } else {
                processRound(); // Auto trigger when time is up
                document.getElementById('timer-display').innerText = "ရလဒ်ထွက်နေသည်...";
            }
        }, 1000);

        function processRound() {
            if (Date.now() < gameState.nextReveal) return; // Prevent multiple runs
            
            const winnerIdx = Math.floor(Math.random() * animals.length);
            const payoutMultiplier = 30;
            const updates = {};
            
            Object.keys(users).forEach(uid => {
                const user = users[uid];
                let winAmount = 0;
                if(user.selections && user.selections[winnerIdx]) {
                    winAmount = user.selections[winnerIdx] * payoutMultiplier;
                }
                updates[`users/${uid}/balance`] = (user.balance || 0) + winAmount;
                updates[`users/${uid}/selections`] = null; // Clear all bets
            });

            updates['gameState'] = {
                nextReveal: Date.now() + 180000, // Reset to 3 minutes
                lastWinnerIdx: winnerIdx
            };
            db.ref().update(updates);
        }

        function updateUI() {
            if(currentUserId || isAdmin) {
                document.getElementById('login-screen').classList.add('hidden-ui');
                document.getElementById('game-ui').classList.remove('hidden-ui');
                if(isAdmin) document.getElementById('admin-panel').classList.remove('hidden-ui');
                
                if(users[currentUserId]) {
                    document.getElementById('current-user-display').innerText = "User: " + users[currentUserId].name;
                    document.getElementById('coin-balance').innerText = users[currentUserId].balance || 0;
                }
            }
            
            if(gameState.lastWinnerIdx !== -1) {
                document.getElementById('result-display').classList.remove('hidden-ui');
                const winnerName = animals[gameState.lastWinnerIdx];
                const userBet = (users[currentUserId] && users[currentUserId].selections) ? (users[currentUserId].selections[gameState.lastWinnerIdx] || 0) : 0;
                const status = userBet > 0 ? `<span class="text-green-600">ဂုဏ်ယူပါတယ်! "${winnerName}" ပေါက်ပါတယ်!</span>` : `<span class="text-red-600">ဝမ်းနည်းပါတယ်! "${winnerName}" ထွက်သွားပါပြီ။</span>`;
                document.getElementById('result-display').innerHTML = `ယခင်ရလဒ် - ${winnerName} <br> ${status}`;
            }
            renderGrid();
            if(isAdmin) renderAdminPanel();
        }

        function renderGrid() {
            const grid = document.getElementById('animal-grid');
            grid.innerHTML = '';
            const user = users[currentUserId] || {};
            animals.forEach((name, i) => {
                const betCount = (user.selections) ? (user.selections[i] || 0) : 0;
                const btn = document.createElement('button');
                btn.className = "relative p-3 bg-white border border-gray-200 rounded-xl shadow-sm text-center hover:bg-blue-50";
                btn.innerHTML = `${name} ${betCount > 0 ? `<div class="bet-badge">${betCount}</div>` : ''}`;
                btn.onclick = () => {
                    if (isAdmin || (user.balance || 0) < 1 || Date.now() > gameState.nextReveal) return;
                    db.ref(`users/${currentUserId}`).update({
                        balance: (user.balance || 0) - 1,
                        [`selections/${i}`]: (betCount + 1)
                    });
                };
                grid.appendChild(btn);
            });
        }

        function renderAdminPanel() {
            const list = document.getElementById('user-select-admin');
            const tbody = document.getElementById('admin-user-table');
            list.innerHTML = ''; tbody.innerHTML = '';
            Object.keys(users).forEach(uid => {
                const user = users[uid];
                // Table row
                const row = document.createElement('tr');
                const bets = user.selections ? Object.keys(user.selections).map(i => animals[i]).join(', ') : '-';
                row.innerHTML = `<td class="p-2 border">${user.name}</td><td class="p-2 border">${user.balance}</td><td class="p-2 border text-xs">${bets}</td>`;
                tbody.appendChild(row);
                // Dropdown
                const opt = document.createElement('option');
                opt.value = uid; opt.innerText = user.name;
                list.appendChild(opt);
            });
        }

        document.getElementById('add-user-btn').onclick = () => {
            const n = document.getElementById('new-user-name').value;
            if(!n) return;
            const uid = n.replace(/[^a-z0-9]/gi, '');
            db.ref('users/' + uid).set({name: n, balance: 100});
            localStorage.setItem('game_uid', uid);
            currentUserId = uid; updateUI();
        };

        document.getElementById('admin-add-coin').onclick = () => {
            const uid = document.getElementById('user-select-admin').value;
            const amt = parseInt(document.getElementById('coin-adjust-val').value);
            db.ref(`users/${uid}/balance`).set((users[uid].balance || 0) + amt);
        };

        document.getElementById('admin-sub-coin').onclick = () => {
            const uid = document.getElementById('user-select-admin').value;
            const amt = parseInt(document.getElementById('coin-adjust-val').value);
            db.ref(`users/${uid}/balance`).set((users[uid].balance || 0) - amt);
        };

        document.getElementById('admin-login-trigger').onclick = () => {
            if(prompt("Admin Password:") === 'admin123') { 
                isAdmin = true; localStorage.setItem('is_admin', 'true'); updateUI(); 
            }
        };

        document.getElementById('logout-btn').onclick = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
</html>
