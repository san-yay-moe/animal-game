<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>တိရစ္ဆာန်လောင်းကစား (၃၆ ကောင်)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .hidden-ui { display: none !important; }
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="message-box" class="fixed top-5 right-5 z-[1000] hidden p-4 rounded-xl shadow-2xl text-white"></div>

    <div id="login-screen" class="fixed inset-0 z-[500] flex items-center justify-center p-4 bg-gray-100">
        <div class="bg-white p-5 rounded-3xl shadow-xl border border-gray-100 max-w-sm w-full">
            <h1 class="text-2xl font-black text-gray-800 mb-6 text-center tracking-tight">တိရစ္ဆာန် လောင်းကစား</h1>
            <div class="mb-4 space-y-3">
                <input type="text" id="login-name" class="p-3 bg-gray-50 border-none rounded-xl w-full focus:ring-2 focus:ring-blue-500 transition" placeholder="အမည် (User ID)">
                <input type="password" id="login-pass" class="p-3 bg-gray-50 border-none rounded-xl w-full focus:ring-2 focus:ring-blue-500 transition" placeholder="စကားဝှက်">
                <button id="login-existing-btn" class="bg-blue-600 text-white w-full py-3 rounded-xl font-bold hover:bg-blue-700 active:scale-95 transition-all shadow-lg shadow-blue-200">ဝင်မည်</button>
            </div>
            <button id="admin-login-trigger" class="w-full text-gray-400 font-semibold text-sm hover:text-gray-800 transition">Admin ဝင်ရောက်ရန်</button>
        </div>
    </div>

    <div id="game-ui" class="hidden-ui flex flex-col md:flex-row h-screen pb-16 md:pb-0">
        <div id="game-sidebar" class="hidden md:flex w-full md:w-80 bg-white border-r border-gray-100 flex-shrink-0 p-4 md:p-6 overflow-y-auto flex-col gap-6 shadow-sm min-h-0">
            <div class="flex flex-col gap-4">
                <h1 class="text-xl font-black text-gray-800 tracking-tight">Game Panel</h1>
                <div class="bg-gray-50 p-4 rounded-2xl flex flex-col gap-2">
                    <p id="current-user-display" class="font-bold text-gray-500 text-xs uppercase tracking-wider"></p>
                    <p class="text-2xl font-black text-gray-800">Coins: <span id="coin-balance" class="text-blue-600">0</span></p>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button id="open-chat-btn" class="bg-gray-100 text-gray-600 py-2 rounded-xl font-bold text-sm hover:bg-gray-200 active:scale-95">💬 Chat</button>
                    <button id="open-private-chat-btn" class="bg-purple-100 text-purple-600 py-2 rounded-xl font-bold text-sm hover:bg-purple-200 active:scale-95">🔒 Admin</button>
                    <button id="open-history-btn" class="col-span-2 bg-yellow-100 text-yellow-600 py-2 rounded-xl font-bold text-sm hover:bg-yellow-200 active:scale-95">📜 History</button>
                    <button id="logout-btn" class="col-span-2 bg-red-50 text-red-600 py-2 rounded-xl font-bold text-sm hover:bg-red-100 active:scale-95">Logout</button>
                </div>
            </div>
            <div class="bg-white border border-gray-100 p-4 rounded-2xl">
                <h4 class="font-bold text-gray-500 text-xs uppercase mb-1">လက်ရှိလောင်းထားမှု</h4>
                <p class="text-xl font-black text-gray-800"><span id="current-bet-count" class="text-red-500">0</span> coin</p>
                <div id="win-loss-status" class="text-xs font-bold mt-2 text-gray-400">စောင့်ဆိုင်းနေသည်...</div>
                <div class="mt-2 text-sm font-bold text-gray-500">အချိန်: <span id="timer-display" class="text-blue-600 font-black">--:--</span></div>
            </div>
        </div>

        <div id="game-content" class="flex-1 bg-gray-50 flex flex-col h-full overflow-hidden">
            <div class="p-4 md:p-8 flex-shrink-0 flex gap-4">
                <div id="result-display" class="hidden-ui bg-yellow-400 p-4 rounded-2xl text-center font-black text-lg shadow-lg text-yellow-900 flex-1"></div>
            </div>

            <div class="flex-1 overflow-y-auto p-4 md:p-8 pt-0">
                <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-6 gap-3" id="animal-grid"></div>

                <div id="admin-panel" class="hidden-ui bg-gray-900 text-white p-4 md:p-8 mt-8 rounded-3xl">
                    <h3 class="font-bold text-yellow-400 mb-6 text-xl tracking-tight">Admin Control</h3>
                    <button class="timer-btn w-12 h-12 rounded-full border-2 border-yellow-400 text-yellow-400 font-bold hover:bg-yellow-400 hover:text-black transition" onclick="setTimer(5)">5</button>
                    <button class="timer-btn w-12 h-12 rounded-full border-2 border-yellow-400 text-yellow-400 font-bold hover:bg-yellow-400 hover:text-black transition" onclick="setTimer(10)">10</button>
                    <button class="timer-btn w-12 h-12 rounded-full border-2 border-yellow-400 text-yellow-400 font-bold hover:bg-yellow-400 hover:text-black transition" onclick="setTimer(30)">30</button>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 mt-6">
                        <button id="reset-game-btn" class="bg-green-600 py-4 rounded-2xl font-bold hover:bg-green-700 transition">Reset</button>
                        <button id="calc-result-btn" class="bg-yellow-600 py-4 rounded-2xl font-bold hover:bg-yellow-700 transition">ရလဒ်ထုတ်</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <div id="bets-list-container" class="bg-white/10 p-4 rounded-2xl text-sm max-h-60 overflow-y-auto border border-white/10">
                            <h4 class="font-bold mb-2 text-yellow-400">လောင်းထားသူများ:</h4>
                            <div id="bets-list-content"></div>
                        </div>
                        <div id="user-balance-list" class="bg-white/10 p-4 rounded-2xl text-sm max-h-60 overflow-y-auto border border-white/10">
                            <h4 class="font-bold mb-2 text-yellow-400">User များ၏ Coins:</h4>
                            <div id="user-balance-content"></div>
                        </div>
                        <div id="active-chats-container" class="bg-white/10 p-4 rounded-2xl text-sm max-h-60 overflow-y-auto border border-white/10">
                            <h4 class="font-bold mb-2 text-yellow-400">Chat များ:</h4>
                            <div id="active-chats-content"></div>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-2 mb-2">
                        <input type="text" id="new-password-admin" class="text-black p-3 rounded-xl flex-grow min-w-[200px]" placeholder="New Password">
                        <button id="change-pass-btn" class="bg-purple-600 px-4 py-3 rounded-xl font-bold flex-grow">Pass ပြင်</button>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <select id="user-select-admin" class="text-black p-3 rounded-xl flex-grow min-w-[150px]"></select>
                        <div class="flex gap-2 w-full justify-center">
                            <input type="number" id="coin-amount" class="text-black p-3 rounded-xl w-24" placeholder="Coin">
                            <button id="add-coin-btn" class="bg-blue-600 px-4 py-3 rounded-xl font-bold">+</button>
                            <button id="sub-coin-btn" class="bg-orange-600 px-4 py-3 rounded-xl font-bold">-</button>
                        </div>
                        <div class="flex gap-2 w-full justify-center">
                            <button id="admin-chat-btn" class="bg-purple-600 px-4 py-3 rounded-xl font-bold flex-grow">Chat</button>
                            <button id="delete-user-btn" class="bg-red-600 px-4 py-3 rounded-xl font-bold flex-grow">ဖျက်</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="mobile-tabs" class="md:hidden fixed bottom-0 left-0 right-0 z-[100] flex bg-white border-t border-gray-200 shadow-[0_-4px_20px_-5px_rgba(0,0,0,0.1)]">
            <button id="tab-game" class="flex-1 py-4 font-bold text-blue-600 border-r border-gray-100 flex items-center justify-center gap-2">🕹️ ဂိမ်း</button>
            <button id="tab-panel" class="flex-1 py-4 font-bold text-gray-400 flex items-center justify-center gap-2">📊 Panel</button>
        </div>
    </div>

    <div id="chat-modal" class="hidden-ui fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
        <div class="bg-white p-6 rounded-3xl shadow-2xl border border-gray-100 w-full max-w-lg">
            <div class="flex justify-between items-center mb-4">
                <h4 class="font-bold text-gray-500 text-xs uppercase">Public Chat</h4>
                <button onclick="document.getElementById('chat-modal').classList.add('hidden-ui')" class="text-gray-400 hover:text-gray-800">✕</button>
            </div>
            <div id="chat-messages" class="h-60 overflow-y-auto mb-4 space-y-2 text-sm bg-gray-50 p-4 rounded-2xl"></div>
            <div class="flex gap-2">
                <input type="text" id="chat-input" class="flex-grow p-4 bg-gray-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500" placeholder="စာရိုက်ပါ...">
                <button id="send-chat-btn" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700">ပို့</button>
            </div>
        </div>
    </div>

    <div id="private-chat-modal" class="hidden-ui fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
        <div class="bg-white p-6 rounded-3xl shadow-2xl border border-gray-100 w-full max-w-lg">
            <div class="flex justify-between items-center mb-4">
                <h4 class="font-bold text-purple-500 text-xs uppercase" id="private-chat-title">Admin Chat</h4>
                <button id="close-private-chat-btn" class="text-gray-400 hover:text-gray-800">✕</button>
            </div>
            <div id="private-chat-messages" class="h-60 overflow-y-auto mb-4 space-y-2 text-sm bg-gray-50 p-4 rounded-2xl"></div>
            <div class="flex gap-2">
                <input type="text" id="private-chat-input" class="flex-grow p-4 bg-gray-100 border-none rounded-xl focus:ring-2 focus:ring-purple-500" placeholder="စာရိုက်ပါ...">
                <button id="send-private-chat-btn" class="bg-purple-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-purple-700">ပို့</button>
            </div>
        </div>
    </div>

    <div id="history-modal" class="hidden-ui fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
        <div class="bg-white p-6 rounded-3xl shadow-2xl border border-gray-100 w-full max-w-2xl max-h-[80vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h4 class="font-bold text-yellow-600 text-xs uppercase">ကစားခဲ့သော မှတ်တမ်း (History)</h4>
                <button onclick="document.getElementById('history-modal').classList.add('hidden-ui')" class="text-gray-400 hover:text-gray-800">✕</button>
            </div>
            <div id="history-content" class="flex-grow overflow-y-auto space-y-3 text-sm"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbRZLUYhEvTHoCscb2ul_JURGsfBjCF4s",
            authDomain: "birthday-62720.firebaseapp.com",
            databaseURL: "https://birthday-62720-default-rtdb.firebaseio.com",
            projectId: "birthday-62720",
            storageBucket: "birthday-62720.firebasestorage.app",
            messagingSenderId: "915031456534",
            appId: "1:915031456534:web:816308654f76be33b62e37"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showMsg(text, isError = false) {
            const box = document.getElementById('message-box');
            box.innerText = text;
            box.className = `fixed top-5 right-5 z-[1000] p-4 rounded-xl shadow-2xl text-white ${isError ? 'bg-red-600' : 'bg-green-600'}`;
            box.classList.remove('hidden-ui');
            setTimeout(() => box.classList.add('hidden-ui'), 3000);
        }

        document.getElementById('tab-game').onclick = () => {
            document.getElementById('game-content').classList.remove('hidden-ui');
            document.getElementById('game-sidebar').classList.add('hidden-ui');
            document.getElementById('game-sidebar').classList.add('hidden');
            document.getElementById('tab-game').classList.replace('text-gray-400', 'text-blue-600');
            document.getElementById('tab-panel').classList.replace('text-blue-600', 'text-gray-400');
        };
        document.getElementById('tab-panel').onclick = () => {
            document.getElementById('game-content').classList.add('hidden-ui');
            document.getElementById('game-sidebar').classList.remove('hidden-ui');
            document.getElementById('game-sidebar').classList.remove('hidden');
            document.getElementById('game-sidebar').classList.add('flex');
            document.getElementById('tab-panel').classList.replace('text-gray-400', 'text-blue-600');
            document.getElementById('tab-game').classList.replace('text-blue-600', 'text-gray-400');
        };

        const gameData = ["မြင်း", "ရွှေနဂါး", "လိပ်ပြာ", "ဆတ်", "မြွေ", "မျောက်", "ပင့်ကူ", "ဗျိုင်း", "ငန်း", "ခရု", "ဆင်", "ရွှေငါး", "ကြက်", "လိပ်", "ကျီး", "ကျား", "ဝက်", "ဒေါင်း", "ယုန်", "ခွေး", "ပုစွန်", "ဆိတ်", "နွား", "ဖား", "ပျား", "ကြွက်", "ငါးရှဉ့်", "ကျားသစ်", "ခြင်္သေ့", "သမင်", "ဝံပုလွေ", "လင်းယုန်", "ကြောင်", "ပုရွက်ဆိတ်", "ပိုးကောင်", "ငါး"];
        const animalEmojis = ["🐎", "🐉", "🦋", "🦌", "🐍", "🐒", "🕷️", "🦢", "🦆", "🐌", "🐘", "🐠", "🐓", "🐢", "🐦‍⬛", "🐅", "🐖", "🦚", "🐇", "🐕", "🦐", "🐐", "🐂", "🐸", "🐝", "🐀", "🐍", "🐆", "🦁", "🦌", "🐺", "🦅", "🐈", "🐜", "🐛", "🐟"];

        let users = {};
        let adminState = { nextReveal: 0, processed: true, lastWinner: "" };
        let currentUserId = localStorage.getItem('game_uid');
        let isAdmin = localStorage.getItem('is_admin') === 'true';
        let selectedMinutes = 3;
        let activePrivateChatUid = null;
        let privateChatListener = null;
        let activeChatsData = {};
        let lastLeader = "";

        function setTimer(m) {
            selectedMinutes = m;
            showMsg(m + " မိနစ် ရွေးချယ်ပြီးပါပြီ");
        }

        db.ref('users').on('value', (snap) => { 
            users = snap.val() || {}; 
            updateUI(); 
            
            let leaderName = "";
            let maxBets = 0;
            Object.keys(users).forEach(uid => {
                const user = users[uid];
                const total = user.selections ? Object.values(user.selections).reduce((a, b) => a + b, 0) : 0;
                if (total > maxBets) {
                    maxBets = total;
                    leaderName = user.name;
                }
            });
            if (leaderName && leaderName !== lastLeader) {
                lastLeader = leaderName;
                if (currentUserId && users[currentUserId] && users[currentUserId].name !== leaderName) {
                    showMsg("အများဆုံးလောင်းထားသူ: " + leaderName);
                }
            }
            if(typeof renderActiveChats === 'function') renderActiveChats();
            if(isAdmin && typeof renderAdminData === 'function') renderAdminData();
        });

        db.ref('adminState').on('value', (snap) => { 
            adminState = snap.val() || { nextReveal: 0, processed: true, lastWinner: "" }; 
            updateUI(); 
        });

        db.ref('chat').limitToLast(20).on('child_added', (snap) => {
            const msg = snap.val();
            const div = document.createElement('div');
            div.className = "border-b pb-1 border-gray-100 py-1";
            div.innerHTML = `<span class="font-bold text-blue-600">${msg.name}:</span> <span class="text-gray-800">${msg.text}</span>`;
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });

        function renderActiveChats() {
            const container = document.getElementById('active-chats-content');
            if(!container) return;
            container.innerHTML = '';
            
            const chatList = Object.keys(activeChatsData || {});
            if (chatList.length === 0) {
                container.innerHTML = '<div class="text-gray-400">Chat လတ်တလောမရှိပါ။</div>';
                return;
            }

            chatList.forEach(uid => {
                const name = (users[uid] && users[uid].name) ? users[uid].name : ("User: " + uid);
                const div = document.createElement('div');
                div.className = "cursor-pointer hover:bg-white/10 p-2 rounded transition text-blue-300 flex justify-between items-center border-b border-white/5 last:border-0";
                div.innerHTML = `<span>💬 ${name}</span> <span class="text-[10px] bg-blue-600/30 px-2 py-0.5 rounded text-white">ဝင်ရန်</span>`;
                div.onclick = function() { openPrivateChat(uid, name); };
                container.appendChild(div);
            });
        }

        db.ref('privateChat').on('value', (snap) => {
            activeChatsData = snap.val() || {};
            renderActiveChats();
        });

        function openPrivateChat(uid, name) {
            if (activePrivateChatUid && privateChatListener) {
                db.ref('privateChat/' + activePrivateChatUid).off('child_added', privateChatListener);
            }
            
            activePrivateChatUid = uid;
            document.getElementById('private-chat-title').innerText = "Chat with " + (isAdmin ? name : "Admin");
            document.getElementById('private-chat-messages').innerHTML = '';
            document.getElementById('private-chat-modal').classList.remove('hidden-ui');

            if (!isAdmin) {
                db.ref('privateChat/' + uid).once('value', (snap) => {
                    if (!snap.exists()) {
                        db.ref('privateChat/' + uid).push({
                            sender: "Bot",
                            text: "မင်္ဂလာပါ! Admin ကို မေးမြန်းလိုသည်များကို စာရိုက်ပေးခဲ့ပါ။",
                            timestamp: Date.now()
                        });
                    }
                });
            }

            privateChatListener = db.ref('privateChat/' + activePrivateChatUid).limitToLast(20).on('child_added', (snap) => {
                const msg = snap.val();
                const div = document.createElement('div');
                div.className = "border-b pb-1 border-gray-100 py-1 flex flex-col";
                
                const isMyMsg = isAdmin ? (msg.sender === 'Admin') : (msg.sender !== 'Admin' && msg.sender !== 'Bot');
                const isBot = msg.sender === 'Bot';
                
                div.innerHTML = `
                    <span class="font-bold text-[11px] ${isMyMsg ? 'text-purple-600' : (isBot ? 'text-yellow-600' : 'text-red-600')}">
                        ${msg.sender}:
                    </span>
                    <span class="text-sm text-gray-800">${msg.text}</span>
                `;
                const container = document.getElementById('private-chat-messages');
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            });
        }

        document.getElementById('send-private-chat-btn').onclick = () => {
            const input = document.getElementById('private-chat-input');
            const text = input.value.trim();
            if(text && activePrivateChatUid) {
                let senderName = isAdmin ? 'Admin' : (users[currentUserId] && users[currentUserId].name ? users[currentUserId].name : currentUserId);
                db.ref('privateChat/' + activePrivateChatUid).push({
                    sender: senderName,
                    text: text,
                    timestamp: Date.now()
                });
                input.value = '';
            }
        };

        document.getElementById('open-private-chat-btn').onclick = () => {
            if(!isAdmin && currentUserId) openPrivateChat(currentUserId, "Admin");
        };

        document.getElementById('close-private-chat-btn').onclick = () => {
            document.getElementById('private-chat-modal').classList.add('hidden-ui');
            if (activePrivateChatUid && privateChatListener) {
                db.ref('privateChat/' + activePrivateChatUid).off('child_added', privateChatListener);
                activePrivateChatUid = null;
            }
        };

        document.getElementById('open-chat-btn').onclick = () => document.getElementById('chat-modal').classList.remove('hidden-ui');

        document.getElementById('send-chat-btn').onclick = () => {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(text && users[currentUserId]) {
                db.ref('chat').push({ name: users[currentUserId].name, text: text, timestamp: Date.now() });
                input.value = '';
            }
        };

        setInterval(() => {
            const display = document.getElementById('timer-display');
            const resultBox = document.getElementById('result-display');
            if(!display) return;
            const diff = adminState.nextReveal - Date.now();
            let timeStr = "";
            if (diff > 0) {
                const mins = Math.floor(diff / 60000);
                const secs = Math.floor((diff % 60000) / 1000);
                timeStr = `${mins}:${secs < 10 ? '0' + secs : secs}`;
                display.innerText = timeStr;
            } else {
                timeStr = "ဂိမ်းရပ်";
                display.innerText = timeStr;
                if (!adminState.processed) {
                    calculateResults();
                }
            }
            if(resultBox && !resultBox.classList.contains('hidden-ui') && adminState.lastWinner) {
                resultBox.innerText = "နောက်ဆုံးရလဒ် - " + adminState.lastWinner + " | အချိန် - " + timeStr;
            }
        }, 1000);

        function calculateResults() {
            db.ref('adminState').transaction((state) => {
                if (state && !state.processed) {
                    state.processed = true;
                    return state;
                }
                return;
            }, (error, committed, snapshot) => {
                if (committed && snapshot.exists()) {
                    performCalculation();
                }
            });
        }

        function performCalculation() {
            let totalBets = new Array(gameData.length).fill(0);
            Object.keys(users).forEach(uid => {
                if(users[uid].selections) {
                    Object.keys(users[uid].selections).forEach(idx => {
                        totalBets[idx] += users[uid].selections[idx];
                    });
                }
            });
            
            let zeroBetIndices = [];
            totalBets.forEach((val, idx) => { if(val === 0) zeroBetIndices.push(idx); });
            let winnerIdx;
            if(zeroBetIndices.length > 0) {
                winnerIdx = zeroBetIndices[Math.floor(Math.random() * zeroBetIndices.length)];
            } else {
                let minVal = Math.min(...totalBets);
                let minIndices = [];
                totalBets.forEach((val, idx) => { if(val === minVal) minIndices.push(idx); });
                winnerIdx = minIndices[Math.floor(Math.random() * minIndices.length)];
            }
            let winnerName = gameData[winnerIdx];
            
            Object.keys(users).forEach(uid => {
                const user = users[uid];
                let winnings = 0;
                if(user.selections && user.selections[winnerIdx]) {
                    winnings = user.selections[winnerIdx] * 27;
                }
                
                if (user.selections) {
                    db.ref(`users/${uid}/history`).push({
                        timestamp: Date.now(),
                        bets: user.selections,
                        winnerIdx: winnerIdx,
                        wonAmount: winnings
                    });
                }
                
                db.ref(`users/${uid}`).update({
                    pendingWinnings: winnings,
                    selections: null
                });
            });

            db.ref('adminState').update({
                lastWinner: winnerName,
                processed: true
            });

            setTimeout(() => {
                autoStartNextRound();
            }, 10000);
        }

        function autoStartNextRound() {
            db.ref('users').once('value', (snap) => {
                const currentUsers = snap.val() || {};
                Object.keys(currentUsers).forEach(uid => {
                    const user = currentUsers[uid];
                    if (user.pendingWinnings) {
                        db.ref(`users/${uid}`).update({
                            balance: (user.balance || 0) + user.pendingWinnings,
                            pendingWinnings: 0
                        });
                    }
                });

                db.ref('adminState').update({
                    nextReveal: Date.now() + (selectedMinutes * 60000),
                    processed: false
                });
            });
        }

        function changeBet(i, delta) {
            const user = users[currentUserId];
            if(!user || adminState.nextReveal <= Date.now()) return;
            const currentBet = (user.selections && user.selections[i]) ? user.selections[i] : 0;
            const balance = Number(user.balance || 0);
            if(delta > 0 && balance >= 1) {
                db.ref(`users/${currentUserId}`).update({
                    balance: balance - 1,
                    [`selections/${i}`]: currentBet + 1
                });
            } else if(delta < 0 && currentBet > 0) {
                db.ref(`users/${currentUserId}`).update({
                    balance: balance + 1,
                    [`selections/${i}`]: currentBet - 1
                });
            }
        }

        function renderGrid() {
            const grid = document.getElementById('animal-grid');
            if(!grid || (!currentUserId && !isAdmin)) return;
            let globalBets = new Array(gameData.length).fill(0);
            Object.keys(users).forEach(uid => {
                if(users[uid].selections) {
                    Object.keys(users[uid].selections).forEach(idx => {
                        globalBets[idx] += users[uid].selections[idx];
                    });
                }
            });
            grid.innerHTML = '';
            gameData.forEach((name, i) => {
                const betCount = (users[currentUserId] && users[currentUserId].selections) ? (users[currentUserId].selections[i] || 0) : 0;
                const total = globalBets[i];
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-3xl shadow-sm border border-gray-100 flex flex-col items-center hover:shadow-xl transition-all hover:scale-105 active:scale-95 cursor-pointer";
                div.innerHTML = `
                    <div class="text-3xl mb-1">${animalEmojis[i]}</div>
                    <div class="font-bold text-gray-700 mb-2">${name}</div>
                    <div class="text-[10px] font-bold text-gray-400 mb-3 bg-gray-100 px-2 py-0.5 rounded-full">စုစုပေါင်း: ${total}</div>
                    ${!isAdmin ? `
                    <div class="flex gap-2 items-center">
                        <button class="w-8 h-8 flex items-center justify-center bg-red-50 text-red-600 rounded-full font-bold hover:bg-red-100" onclick="changeBet(${i}, -1); event.stopPropagation();">-</button>
                        <span class="font-black text-blue-600 min-w-[20px] text-center">${betCount}</span>
                        <button class="w-8 h-8 flex items-center justify-center bg-green-50 text-green-600 rounded-full font-bold hover:bg-green-100" onclick="changeBet(${i}, 1); event.stopPropagation();">+</button>
                    </div>` : ''}
                `;
                grid.appendChild(div);
            });
        }

        document.getElementById('open-history-btn').onclick = () => {
            const modal = document.getElementById('history-modal');
            const content = document.getElementById('history-content');
            content.innerHTML = '';
            
            if(users[currentUserId] && users[currentUserId].history) {
                const table = document.createElement('table');
                table.className = "w-full text-left border-collapse";
                table.innerHTML = `
                    <thead class="text-xs text-gray-500 uppercase bg-gray-100">
                        <tr>
                            <th class="p-2 border text-center">အချိန်</th>
                            <th class="p-2 border">လောင်းခဲ့သည့်အကောင်</th>
                            <th class="p-2 border text-center">အနိုင်ရအကောင်</th>
                            <th class="p-2 border text-center">ရရှိငွေ</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                `;
                content.appendChild(table);
                const tbody = document.getElementById('history-body');

                Object.values(users[currentUserId].history).reverse().forEach(h => {
                    let betDetails = '';
                    if (h.bets) {
                        Object.keys(h.bets).forEach(idx => {
                            betDetails += `${gameData[idx]}(${h.bets[idx]} coins) `;
                        });
                    }
                    
                    const row = document.createElement('tr');
                    row.className = "border-b text-[11px] hover:bg-gray-50";
                    row.innerHTML = `
                        <td class="p-2 border text-center">${new Date(h.timestamp).toLocaleTimeString()}</td>
                        <td class="p-2 border">${betDetails || '-'}</td>
                        <td class="p-2 border text-center font-bold text-green-600">${gameData[h.winnerIdx] || '-'}</td>
                        <td class="p-2 border text-center font-bold text-green-600">
                            ${h.wonAmount > 0 ? 'Win ' + h.wonAmount : '0'}
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } else {
                content.innerHTML = "<div class='text-center py-8 text-gray-400 font-bold'>မှတ်တမ်းမရှိသေးပါ။</div>";
            }
            modal.classList.remove('hidden-ui');
        };

        function renderAdminData() {
            if(!isAdmin) return;
            
            const balanceContent = document.getElementById('user-balance-content');
            const select = document.getElementById('user-select-admin');
            
            let balanceHtml = '';
            let selectHtml = '<option value="">User ရွေးရန်</option>';
            
            Object.keys(users).forEach(uid => {
                const user = users[uid];
                balanceHtml += `
                    <div class="flex justify-between border-b border-white/10 py-1 text-xs items-center">
                        <span>${user.name}</span>
                        <div class="flex gap-2">
                            <span class="font-bold text-yellow-400">${user.balance || 0} Coins</span>
                            <button class="bg-yellow-600 px-2 py-0.5 rounded text-[10px]" onclick="showUserHistory('${uid}')">History</button>
                        </div>
                    </div>
                `;
                selectHtml += `<option value="${uid}">${user.name} (${user.balance || 0})</option>`;
            });
            
            if (balanceContent) balanceContent.innerHTML = balanceHtml || '<div class="text-gray-400">User မရှိပါ။</div>';
            if (select) {
                const previousSelection = select.value;
                select.innerHTML = selectHtml;
                select.value = previousSelection;
            }

            const betsContent = document.getElementById('bets-list-content');
            if (betsContent) {
                let betsHtml = '';
                Object.keys(users).forEach(uid => {
                    const u = users[uid];
                    if(u.selections) {
                        Object.keys(u.selections).forEach(idx => {
                            betsHtml += `
                                <div class="border-b border-white/10 py-1 text-xs flex justify-between">
                                    <span>${u.name}</span>
                                    <span>${gameData[idx]} (${u.selections[idx]} coins)</span>
                                </div>
                            `;
                        });
                    }
                });
                betsContent.innerHTML = betsHtml || '<div class="text-gray-400">လောင်းထားသူမရှိသေးပါ။</div>';
            }
        }

        function showUserHistory(uid) {
            const user = users[uid];
            if (!user) return;
            const modal = document.getElementById('history-modal');
            const content = document.getElementById('history-content');
            content.innerHTML = `<h4 class="font-bold mb-2 text-yellow-600">${user.name} ၏ မှတ်တမ်း</h4>`;
            
            if(user.history) {
                const table = document.createElement('table');
                table.className = "w-full text-left border-collapse";
                table.innerHTML = `
                    <thead class="text-xs text-gray-500 uppercase bg-gray-100">
                        <tr>
                            <th class="p-2 border text-center">အချိန်</th>
                            <th class="p-2 border">လောင်းခဲ့သည့်အကောင်</th>
                            <th class="p-2 border text-center">အနိုင်ရအကောင်</th>
                            <th class="p-2 border text-center">ရရှိငွေ</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                `;
                content.appendChild(table);
                const tbody = document.getElementById('history-body');

                Object.values(user.history).reverse().forEach(h => {
                    let betDetails = '';
                    if (h.bets) {
                        Object.keys(h.bets).forEach(idx => {
                            betDetails += `${gameData[idx]}(${h.bets[idx]} coins) `;
                        });
                    }
                    
                    const row = document.createElement('tr');
                    row.className = "border-b text-[11px] hover:bg-gray-50";
                    row.innerHTML = `
                        <td class="p-2 border text-center">${new Date(h.timestamp).toLocaleTimeString()}</td>
                        <td class="p-2 border">${betDetails || '-'}</td>
                        <td class="p-2 border text-center font-bold text-green-600">${gameData[h.winnerIdx] || '-'}</td>
                        <td class="p-2 border text-center font-bold text-green-600">
                            ${h.wonAmount > 0 ? 'Win ' + h.wonAmount : '0'}
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } else {
                content.innerHTML += "<div class='text-center py-8 text-gray-400 font-bold'>မှတ်တမ်းမရှိသေးပါ။</div>";
            }
            modal.classList.remove('hidden-ui');
        }

        function updateUI() {
            if (currentUserId && Object.keys(users).length > 0 && !users[currentUserId] && !isAdmin) { 
                localStorage.removeItem('game_uid'); 
                currentUserId = null; 
            }
            
            if(currentUserId || isAdmin) {
                document.getElementById('login-screen').classList.add('hidden-ui');
                document.getElementById('game-ui').classList.remove('hidden-ui');
                const user = users[currentUserId];
                if(user) {
                    const totalBet = user.selections ? Object.values(user.selections).reduce((a, b) => a + b, 0) : 0;
                    document.getElementById('current-bet-count').innerText = totalBet;
                    const statusDiv = document.getElementById('win-loss-status');
                    
                    if (user.pendingWinnings !== undefined && user.pendingWinnings > 0) {
                        statusDiv.innerHTML = `<span class="text-green-600 font-black">🎉 အနိုင်ရငွေ: +${user.pendingWinnings}</span>`;
                    } else if (adminState.lastWinner) {
                        statusDiv.innerHTML = `<span class="text-gray-500 font-bold">နောက်ဆုံးရလဒ် - ${adminState.lastWinner}</span>`;
                    } else {
                        statusDiv.innerHTML = `<span class="text-gray-400 font-semibold">လောင်းကစားချိန် စတင်နေသည်...</span>`;
                    }
                }
                if(isAdmin) {
                    document.getElementById('admin-panel').classList.remove('hidden-ui');
                } else {
                    document.getElementById('admin-panel').classList.add('hidden-ui');
                }
                
                if(!isAdmin && users[currentUserId]) {
                    document.getElementById('current-user-display').innerText = "User: " + users[currentUserId].name;
                    document.getElementById('coin-balance').innerText = users[currentUserId].balance || 0;
                }
                if(adminState.lastWinner) {
                    document.getElementById('result-display').classList.remove('hidden-ui');
                    document.getElementById('result-display').innerText = "နောက်ဆုံးရလဒ် - " + adminState.lastWinner;
                } else {
                    document.getElementById('result-display').classList.add('hidden-ui');
                }
            } else {
                document.getElementById('login-screen').classList.remove('hidden-ui');
                document.getElementById('game-ui').classList.add('hidden-ui');
            }
            renderGrid();
        }

        document.getElementById('admin-chat-btn').onclick = () => {
            const uid = document.getElementById('user-select-admin').value;
            if(uid) openPrivateChat(uid, users[uid].name);
        };
        document.getElementById('add-coin-btn').onclick = () => {
            const uid = document.getElementById('user-select-admin').value;
            const amt = parseInt(document.getElementById('coin-amount').value);
            if(uid && amt) {
                db.ref(`users/${uid}/balance`).set((users[uid].balance || 0) + amt).then(() => {
                    showMsg("Coin ထည့်သွင်းပြီးပါပြီ");
                    document.getElementById('coin-amount').value = '';
                });
            }
        };
        document.getElementById('sub-coin-btn').onclick = () => {
            const uid = document.getElementById('user-select-admin').value;
            const amt = parseInt(document.getElementById('coin-amount').value);
            if(uid && amt) {
                db.ref(`users/${uid}/balance`).set(Math.max(0, (users[uid].balance || 0) - amt)).then(() => {
                    showMsg("Coin နှုတ်ယူပြီးပါပြီ");
                    document.getElementById('coin-amount').value = '';
                });
            }
        };
        document.getElementById('change-pass-btn').onclick = () => {
            const uid = document.getElementById('user-select-admin').value;
            const newPass = document.getElementById('new-password-admin').value.trim();
            if(uid && newPass) {
                db.ref(`users/${uid}/password`).set(newPass).then(() => {
                    showMsg("စကားဝှက် ပြောင်းလဲပြီးပါပြီ");
                    document.getElementById('new-password-admin').value = '';
                });
            }
        };
        document.getElementById('delete-user-btn').onclick = () => {
            const uid = document.getElementById('user-select-admin').value;
            if(uid) {
                db.ref(`users/${uid}`).remove().then(() => {
                    showMsg("အကောင့် ဖျက်ပြီးပါပြီ");
                });
            }
        };
        document.getElementById('reset-game-btn').onclick = () => {
            db.ref('adminState').update({ nextReveal: Date.now() + (selectedMinutes * 60000), processed: false }).then(() => {
                showMsg("ဂိမ်းအား Reset ချပြီးပါပြီ (" + selectedMinutes + " မိနစ်)");
            });
        };
        document.getElementById('calc-result-btn').onclick = () => calculateResults();
        
        document.getElementById('login-existing-btn').onclick = () => {
            const n = document.getElementById('login-name').value.trim();
            const p = document.getElementById('login-pass').value.trim();
            if(!n || !p) { showMsg("အမည်နှင့် စကားဝှက် ထည့်ပါ", true); return; }
            const uid = n.replace(/[^a-z0-9]/gi, '');
            
            if(users[uid]) {
                if(users[uid].password === p) { 
                    localStorage.setItem('game_uid', uid); 
                    currentUserId = uid; 
                    updateUI(); 
                    showMsg("ဝင်ရောက်မှု အောင်မြင်ပါသည်");
                } else {
                    showMsg("အမည် သို့မဟုတ် စကားဝှက် မှားနေသည်", true);
                }
            } else {
                db.ref(`users/${uid}`).set({
                    name: n,
                    password: p,
                    balance: 1000,
                    selections: null
                }).then(() => {
                    localStorage.setItem('game_uid', uid); 
                    currentUserId = uid; 
                    updateUI(); 
                    showMsg("အကောင့်အသစ် ဖန်တီးပြီး ဝင်ရောက်လိုက်ပါပြီ");
                });
            }
        };

        document.getElementById('admin-login-trigger').onclick = () => { 
            if(prompt("Admin Password:") === 'admin123') { 
                isAdmin = true; 
                localStorage.setItem('is_admin', 'true'); 
                updateUI(); 
                showMsg("Admin ဝင်ရောက်မှု အောင်မြင်ပါသည်");
            } 
        };
        
        document.getElementById('logout-btn').onclick = () => { 
            localStorage.clear(); 
            location.reload(); 
        };

        updateUI();
    </script>
</body>
</html>
