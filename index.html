<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>တိရစ္ဆာန်လောင်းကစား (Multiplayer)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .bet-badge { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold; }
        .hidden-ui { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div id="app" class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-center mb-4">တိရစ္ဆာန် လောင်းကစား (၃၆ ကောင်)</h1>
        
        <!-- Login Screen -->
        <div id="login-screen" class="bg-white p-6 rounded-xl shadow-lg border">
            <h2 class="text-center font-bold mb-4">User/Admin Login</h2>
            <input type="text" id="user-name" class="w-full p-2 border rounded mb-2" placeholder="အမည်">
            <input type="password" id="user-pass" class="w-full p-2 border rounded mb-2" placeholder="စကားဝှက်">
            <button id="login-btn" class="w-full bg-green-600 text-white p-2 rounded mb-2">User အသစ်ဖန်တီးမည် (Coin: 0)</button>
            <button id="admin-login-btn" class="w-full bg-gray-800 text-white p-2 rounded">Admin အဖြစ် ဝင်ရောက်ရန်</button>
        </div>

        <!-- Game UI -->
        <div id="game-ui" class="hidden-ui">
            <div class="bg-white p-4 rounded-xl shadow flex justify-between items-center mb-4 border">
                <div id="user-info" class="font-bold text-blue-600">Coin: 0</div>
                <button id="logout-btn" class="bg-red-500 text-white px-4 py-1 rounded">Logout</button>
            </div>

            <div id="admin-panel" class="hidden-ui bg-gray-800 text-white p-4 rounded-xl mb-4">
                <h3 class="text-yellow-400 font-bold mb-2">Admin Panel</h3>
                <div class="flex gap-2 mb-4">
                    <button id="admin-close-btn" class="bg-red-600 p-2 rounded flex-1">ဂိမ်းပိတ်မည်</button>
                    <button id="admin-open-btn" class="bg-green-600 p-2 rounded flex-1">ဂိမ်းဖွင့်မည်</button>
                    <span id="game-status-text" class="px-3 py-2 bg-green-700 rounded font-bold">ဂိမ်းဖွင့်ထားသည်</span>
                </div>
                <select id="user-select" class="w-full p-2 text-black rounded mb-2"></select>
                <input type="number" id="coin-input" class="w-full p-2 text-black rounded mb-2" placeholder="Coin ပမာဏ">
                <div class="flex gap-2">
                    <button id="admin-add-coin" class="bg-blue-600 p-2 rounded flex-1">ထည့်</button>
                    <button id="admin-sub-coin" class="bg-orange-600 p-2 rounded flex-1">နုတ်</button>
                </div>
            </div>

            <div class="text-center font-bold mb-4 p-2 bg-blue-100 rounded border" id="timer-display">လာမည့်အဖြေအတွက် - 30:00</div>
            <div id="animal-grid" class="grid grid-cols-3 md:grid-cols-6 gap-2"></div>
        </div>
    </div>

    <script>
        // Firebase Config (သင်ရထားတဲ့တန်ဖိုးများနဲ့ ပြင်ထားပေးပါတယ်)
        const firebaseConfig = {
            apiKey: "AIzaSyBbRZLUYhEVThOCscb2uL_JURGsfBjCF4s",
            authDomain: "birthday-62720.firebaseapp.com",
            databaseURL: "https://birthday-62720-default-rtdb.firebaseio.com",
            projectId: "birthday-62720",
            storageBucket: "birthday-62720.firebasestorage.app",
            messagingSenderId: "915031456534",
            appId: "1:915031456534:web:816308654f76be33b62e37"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const animals = ["မြင်း", "ရွှေနဂါး", "လိပ်ပြာ", "ဆတ်", "မြွေ", "မျောက်", "ပင့်ကူ", "ဗျိုင်း", "ငန်း", "ခရု", "ဆင်", "ရွှေငါး", "ကြက်", "လိပ်", "ကျီး", "ကျား", "ဝက်", "ဒေါင်း", "ယုန်", "ခွေး", "ပုစွန်", "ဆိတ်", "နွား", "ဖား", "ပျား", "ကြွက်", "ငါးရှဉ့်", "ကျားသစ်", "ခြင်္သေ့", "သမင်", "ဝံပုလွေ", "လင်းယုန်", "ကြောင်", "ပုရွက်ဆိတ်", "ပိုးကောင်", "ငါး"];
        let currentUser = null;
        let isAdmin = false;

        // Load Game Data
        db.ref('game_state').on('value', snap => {
            const state = snap.val() || { isOpen: false };
            updateUI(state);
        });

        // Load Users
        db.ref('users').on('value', snap => {
            const users = snap.val() || {};
            if(currentUser && !isAdmin) {
                const user = users[currentUser];
                if(user) document.getElementById('user-info').innerText = `Coin: ${user.balance || 0}`;
            }
            if(isAdmin) updateAdminUserList(users);
        });

        function updateUI(state) {
            const statusText = document.getElementById('game-status-text');
            statusText.innerText = state.isOpen ? "ဂိမ်းဖွင့်ထားသည်" : "ဂိမ်းပိတ်ထားသည်";
            statusText.className = `px-3 py-2 rounded font-bold ${state.isOpen ? 'bg-green-700' : 'bg-red-700'}`;
            
            const grid = document.getElementById('animal-grid');
            grid.innerHTML = '';
            animals.forEach((name, i) => {
                const btn = document.createElement('button');
                btn.className = "relative p-4 bg-white shadow rounded text-center border hover:bg-gray-50";
                btn.innerHTML = `${name}`;
                btn.onclick = () => { if(state.isOpen && !isAdmin) alert("လောင်းပါမည် - " + name); };
                grid.appendChild(btn);
            });
        }

        // Login Logic
        document.getElementById('login-btn').onclick = () => {
            const name = document.getElementById('user-name').value;
            if(!name) return;
            currentUser = name;
            db.ref('users/' + name).transaction(u => u || { balance: 0 });
            document.getElementById('login-screen').classList.add('hidden-ui');
            document.getElementById('game-ui').classList.remove('hidden-ui');
        };

        document.getElementById('admin-login-btn').onclick = () => {
            if(document.getElementById('user-pass').value === 'admin123') {
                isAdmin = true;
                currentUser = "ADMIN";
                document.getElementById('admin-panel').classList.remove('hidden-ui');
                document.getElementById('login-screen').classList.add('hidden-ui');
                document.getElementById('game-ui').classList.remove('hidden-ui');
            }
        };

        // Admin Actions
        document.getElementById('admin-open-btn').onclick = () => db.ref('game_state/isOpen').set(true);
        document.getElementById('admin-close-btn').onclick = () => db.ref('game_state/isOpen').set(false);

        function updateAdminUserList(users) {
            const select = document.getElementById('user-select');
            select.innerHTML = '<option value="">User ရွေးပါ</option>';
            Object.keys(users).forEach(u => select.innerHTML += `<option value="${u}">${u} (${users[u].balance})</option>`);
        }

        document.getElementById('admin-add-coin').onclick = () => {
            const uid = document.getElementById('user-select').value;
            const amt = parseInt(document.getElementById('coin-input').value);
            if(uid && amt) db.ref('users/' + uid + '/balance').transaction(b => (b || 0) + amt);
        };

        document.getElementById('logout-btn').onclick = () => location.reload();
    </script>
</body>
</html>
