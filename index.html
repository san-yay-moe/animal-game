<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>တိရစ္ဆာန်လောင်းကစား (၃၆ ကောင်)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .hidden-ui { display: none !important; }
        .bet-badge { position: absolute; top: -5px; right: -5px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div id="app" class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">တိရစ္ဆာန် လောင်းကစား (၃၆ ကောင်)</h1>

        <!-- Login Screen -->
        <div id="login-screen" class="bg-white p-6 rounded-2xl shadow-xl max-w-md mx-auto">
            <h2 class="text-lg font-bold mb-4 text-center">ဝင်ရောက်ရန်</h2>
            <div id="user-list" class="grid grid-cols-2 gap-2 mb-6"></div>
            <div class="border-t pt-4">
                <input type="text" id="new-user-name" class="p-3 border rounded-lg w-full mb-2" placeholder="အမည်">
                <input type="password" id="new-user-pass" class="p-3 border rounded-lg w-full mb-2" placeholder="စကားဝှက်">
                <button id="add-user-btn" class="bg-green-600 text-white w-full py-3 rounded-lg font-bold hover:bg-green-700">User အသစ်ဖန်တီးမည်</button>
            </div>
        </div>

        <!-- Game UI -->
        <div id="game-ui" class="hidden-ui">
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 flex justify-between items-center border">
                <div>
                    <p id="current-user-display" class="font-bold"></p>
                    <p class="text-blue-600 font-bold text-lg">Coins: <span id="coin-balance">0</span></p>
                </div>
                <button id="logout-btn" class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm">Logout</button>
            </div>

            <div class="bg-blue-600 text-white p-4 rounded-xl text-center font-bold mb-6">
                အချိန် - <span id="timer-display" class="text-2xl font-mono">--:--</span>
            </div>

            <div id="result-display" class="hidden-ui bg-yellow-100 p-4 rounded-xl text-center font-bold mb-6 border border-yellow-300"></div>

            <div class="grid grid-cols-4 md:grid-cols-6 gap-3" id="animal-grid"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbRZLUYhEvTHoCscb2ul_JURGsfBjCF4s",
            authDomain: "birthday-62720.firebaseapp.com",
            databaseURL: "https://birthday-62720-default-rtdb.firebaseio.com",
            projectId: "birthday-62720",
            storageBucket: "birthday-62720.firebasestorage.app",
            messagingSenderId: "915031456534",
            appId: "1:915031456534:web:816308654f76be33b62e37"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const gameData = ["မြင်း", "ရွှေနဂါး", "လိပ်ပြာ", "ဆတ်", "မြွေ", "မျောက်", "ပင့်ကူ", "ဗျိုင်း", "ငန်း", "ခရု", "ဆင်", "ရွှေငါး", "ကြက်", "လိပ်", "ကျီး", "ကျား", "ဝက်", "ဒေါင်း", "ယုန်", "ခွေး", "ပုစွန်", "ဆိတ်", "နွား", "ဖား", "ပျား", "ကြွက်", "ငါးရှဉ့်", "ကျားသစ်", "ခြင်္သေ့", "သမင်", "ဝံပုလွေ", "လင်းယုန်", "ကြောင်", "ပုရွက်ဆိတ်", "ပိုးကောင်", "ငါး"];

        let users = {};
        let adminState = { nextReveal: Date.now() + 180000, lastWinner: "" };
        let currentUserId = localStorage.getItem('game_uid');

        db.ref('users').on('value', (snap) => { users = snap.val() || {}; updateUI(); });
        db.ref('adminState').on('value', (snap) => { adminState = snap.val() || adminState; updateUI(); });

        // Logic: 3 min timer loop
        setInterval(() => {
            const diff = adminState.nextReveal - Date.now();
            if(diff <= 0) {
                // Time up! Process the game if I am the "host" client (or check for last Winner)
                if(adminState.lastWinner === "") processGame();
            }
            
            const display = document.getElementById('timer-display');
            if(display) {
                if(diff > 0) {
                    const m = Math.floor(diff/60000);
                    const s = Math.floor((diff%60000)/1000);
                    display.innerText = `${m}:${s < 10 ? '0'+s : s}`;
                } else display.innerText = "ရလဒ်ထွက်နေသည်...";
            }
        }, 1000);

        function processGame() {
            let animalBets = new Array(36).fill(0);
            let totalBets = 0;
            
            // Collect all bets
            Object.keys(users).forEach(uid => {
                if(users[uid].selections) {
                    gameData.forEach((_, i) => {
                        const b = users[uid].selections[i] || 0;
                        animalBets[i] += b;
                        totalBets += b;
                    });
                }
            });

            let winningIdx = -1;
            let multiplier = 0;

            // Logic: 30 count check
            if (totalBets > 30) {
                let minVal = Infinity;
                gameData.forEach((_, i) => {
                    if (animalBets[i] > 0 && animalBets[i] < minVal) {
                        minVal = animalBets[i];
                        winningIdx = i;
                    }
                });
                multiplier = 27;
            } else {
                let zeros = [];
                gameData.forEach((_, i) => { if(animalBets[i] === 0) zeros.push(i); });
                winningIdx = zeros[Math.floor(Math.random() * zeros.length)];
                multiplier = 0;
            }

            // Payout
            Object.keys(users).forEach(uid => {
                if(users[uid].selections && users[uid].selections[winningIdx] && multiplier > 0) {
                    const win = users[uid].selections[winningIdx] * multiplier;
                    db.ref(`users/${uid}/balance`).transaction(b => (b || 0) + win);
                }
                db.ref(`users/${uid}/selections`).set({});
            });
            
            db.ref('adminState').set({ 
                lastWinner: gameData[winningIdx], 
                nextReveal: Date.now() + 180000 
            });
        }

        function updateUI() {
            if(currentUserId) {
                document.getElementById('login-screen').classList.add('hidden-ui');
                document.getElementById('game-ui').classList.remove('hidden-ui');
                if(users[currentUserId]) {
                    document.getElementById('current-user-display').innerText = "User: " + users[currentUserId].name;
                    document.getElementById('coin-balance').innerText = users[currentUserId].balance || 0;
                }
            }
            if(adminState.lastWinner) {
                document.getElementById('result-display').classList.remove('hidden-ui');
                document.getElementById('result-display').innerText = "ပြီးခဲ့သည့်ပွဲ အနိုင် - " + adminState.lastWinner;
            }
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('animal-grid');
            grid.innerHTML = '';
            const user = users[currentUserId];
            gameData.forEach((name, i) => {
                const betCount = (user && user.selections) ? (user.selections[i] || 0) : 0;
                const btn = document.createElement('div');
                btn.className = "relative p-4 bg-white border rounded-xl cursor-pointer hover:bg-blue-50 text-sm text-center";
                btn.innerHTML = `${name} ${betCount > 0 ? `<div class="bet-badge bg-red-500 text-white rounded-full w-5 h-5 text-[10px] flex items-center justify-center font-bold">${betCount}</div>` : ''}`;
                btn.onclick = () => {
                    if((user.balance || 0) < 1) return;
                    db.ref(`users/${currentUserId}/balance`).transaction(b => (b || 0) - 1);
                    db.ref(`users/${currentUserId}/selections/${i}`).transaction(b => (b || 0) + 1);
                };
                grid.appendChild(btn);
            });
        }

        document.getElementById('add-user-btn').onclick = () => {
            const n = document.getElementById('new-user-name').value;
            const p = document.getElementById('new-user-pass').value;
            const uid = n.replace(/[^a-z0-9]/gi, '');
            db.ref('users/' + uid).set({name: n, password: p, balance: 100, selections: {}});
            localStorage.setItem('game_uid', uid);
            currentUserId = uid;
            updateUI();
        };

        document.getElementById('logout-btn').onclick = () => { localStorage.clear(); location.reload(); };

        updateUI();
    </script>
</body>
</html>
