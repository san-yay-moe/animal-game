<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>တိရစ္ဆာန်လောင်းကစား (၃၆ ကောင်)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .hidden-ui { display: none !important; }
        .bet-badge { position: absolute; top: -5px; right: -5px; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div id="app" class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">တိရစ္ဆာန် လောင်းကစား (၃၆ ကောင်)</h1>

        <!-- Login Screen -->
        <div id="login-screen" class="bg-white p-6 rounded-2xl shadow-xl max-w-md mx-auto">
            <h2 class="text-lg font-bold mb-4 text-center">အကောင့်ဝင်ရန်</h2>
            <input type="text" id="user-name" class="w-full p-3 border rounded mb-4" placeholder="အမည် (Name)">
            <button id="login-btn" class="w-full bg-blue-600 text-white p-3 rounded font-bold mb-3">ဝင်ရောက်မည်</button>
            <button id="admin-login-btn" class="w-full bg-gray-800 text-white p-3 rounded font-bold">Admin အဖြစ် ဝင်ရန်</button>
        </div>

        <!-- Game UI -->
        <div id="game-ui" class="hidden-ui">
            <div class="bg-white p-4 rounded-xl shadow mb-4 flex justify-between items-center">
                <span id="user-display" class="font-bold text-blue-600">...</span>
                <button id="logout-btn" class="bg-red-500 text-white px-4 py-1 rounded">Logout</button>
            </div>
            <div class="text-center font-bold text-xl mb-4 text-blue-700">အချိန်: <span id="timer">--:--</span></div>
            <div id="animal-grid" class="grid grid-cols-4 sm:grid-cols-6 gap-2"></div>
            
            <!-- Admin Panel -->
            <div id="admin-panel" class="hidden-ui mt-8 bg-gray-900 text-white p-6 rounded-2xl shadow-xl">
                <h3 class="font-bold text-yellow-400 mb-4 text-lg">Admin Panel</h3>
                <div id="admin-user-list" class="space-y-3 text-sm"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbRZLUYhEvTHoCscb2ul_JURGsfBjCF4s",
            authDomain: "birthday-62720.firebaseapp.com",
            databaseURL: "https://birthday-62720-default-rtdb.firebaseio.com",
            projectId: "birthday-62720",
            storageBucket: "birthday-62720.firebasestorage.app",
            messagingSenderId: "915031456534",
            appId: "1:915031456534:web:816308654f76be33b62e37"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const animals = ["မြင်း", "ရွှေနဂါး", "လိပ်ပြာ", "ဆတ်", "မြွေ", "မျောက်", "ပင့်ကူ", "ဗျိုင်း", "ငန်း", "ခရု", "ဆင်", "ရွှေငါး", "ကြက်", "လိပ်", "ကျီး", "ကျား", "ဝက်", "ဒေါင်း", "ယုန်", "ခွေး", "ပုစွန်", "ဆိတ်", "နွား", "ဖား", "ပျား", "ကြွက်", "ငါးရှဉ့်", "ကျားသစ်", "ခြင်္သေ့", "သမင်", "ဝံပုလွေ", "လင်းယုန်", "ကြောင်", "ပုရွက်ဆိတ်", "ပိုးကောင်", "ငါး"];
        
        let currentUser = localStorage.getItem('game_uid');
        let isAdmin = localStorage.getItem('is_admin') === 'true';
        let users = {};
        let adminState = { nextReveal: Date.now() + 180000 };

        db.ref('users').on('value', (snap) => { users = snap.val() || {}; updateUI(); });
        db.ref('adminState').on('value', (snap) => { if(snap.val()) adminState = snap.val(); });

        // Auto Timer
        setInterval(() => {
            const diff = adminState.nextReveal - Date.now();
            if (diff > 0) {
                const m = Math.floor(diff/60000); const s = Math.floor((diff%60000)/1000);
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            } else {
                document.getElementById('timer').innerText = "ရလဒ်ထွက်နေသည်...";
                if(isAdmin || Object.keys(users)[0] === currentUser) processGame();
            }
        }, 1000);

        function processGame() {
            let winner = Math.floor(Math.random() * 36);
            Object.keys(users).forEach(uid => {
                let win = 0;
                if(users[uid].selections && users[uid].selections[winner]) win = users[uid].selections[winner] * 30;
                db.ref(`users/${uid}/balance`).set((users[uid].balance || 100) + win);
                db.ref(`users/${uid}/selections`).remove();
            });
            db.ref('adminState/nextReveal').set(Date.now() + 180000);
        }

        document.getElementById('login-btn').onclick = async () => {
            const name = document.getElementById('user-name').value.trim();
            if(!name) return alert("အမည်ထည့်ပါ");
            const uid = name.replace(/[^a-z0-9]/gi, '').toLowerCase();
            const snap = await db.ref('users/' + uid).once('value');
            if(!snap.exists()) await db.ref('users/' + uid).set({name: name, balance: 100, selections: {}});
            localStorage.setItem('game_uid', uid);
            currentUser = uid;
            updateUI();
        };

        document.getElementById('admin-login-btn').onclick = () => {
            if(prompt("Admin Password:") === 'admin123') {
                isAdmin = true; localStorage.setItem('is_admin', 'true'); updateUI();
            } else alert("Password မှားသည်");
        };

        function updateUI() {
            if((currentUser && users[currentUser]) || isAdmin) {
                document.getElementById('login-screen').classList.add('hidden-ui');
                document.getElementById('game-ui').classList.remove('hidden-ui');
                if(!isAdmin) document.getElementById('user-display').innerText = `${users[currentUser].name} | Coin: ${users[currentUser].balance}`;
                
                if(isAdmin) {
                    document.getElementById('admin-panel').classList.remove('hidden-ui');
                    renderAdminPanel();
                }
                renderGrid();
            }
        }

        function renderGrid() {
            const grid = document.getElementById('animal-grid');
            grid.innerHTML = '';
            if(isAdmin) return;
            animals.forEach((a, i) => {
                const count = (users[currentUser].selections && users[currentUser].selections[i]) ? users[currentUser].selections[i] : 0;
                const btn = document.createElement('button');
                btn.className = "p-2 bg-white border rounded shadow-sm text-xs hover:bg-blue-50 relative";
                btn.innerHTML = `${a} ${count > 0 ? `<span class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-4 h-4 text-[10px]">${count}</span>` : ''}`;
                btn.onclick = () => {
                    if(users[currentUser].balance < 1) return alert("Coin မလုံလောက်ပါ");
                    db.ref(`users/${currentUser}/balance`).set(users[currentUser].balance - 1);
                    db.ref(`users/${currentUser}/selections/${i}`).set((users[currentUser].selections && users[currentUser].selections[i] ? users[currentUser].selections[i] : 0) + 1);
                };
                grid.appendChild(btn);
            });
        }

        function renderAdminPanel() {
            const list = document.getElementById('admin-user-list');
            list.innerHTML = Object.keys(users).map(u => `
                <div class="flex justify-between items-center bg-gray-800 p-2 rounded">
                    <span>${users[u].name}: ${users[u].balance}</span>
                    <div class="flex gap-2">
                        <button onclick="changeCoin('${u}', 10)" class="bg-blue-600 px-2 rounded">+</button>
                        <button onclick="changeCoin('${u}', -10)" class="bg-red-600 px-2 rounded">-</button>
                    </div>
                </div>
            `).join('');
        }

        window.changeCoin = (uid, amt) => db.ref(`users/${uid}/balance`).set((users[uid].balance || 0) + amt);
        document.getElementById('logout-btn').onclick = () => { localStorage.clear(); location.reload(); };
        
        if(currentUser || isAdmin) updateUI();
    </script>
</body>
</html>
